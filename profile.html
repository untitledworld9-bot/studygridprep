<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Profile - Study Grid Prep</title>
<link rel="icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- ✅ THEME: Apply instantly before paint -->
<script>
(function(){
  var saved = localStorage.getItem("theme");
  var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  var theme = saved ? saved : (systemDark ? "dark" : "light");
  document.documentElement.setAttribute("data-theme", theme);
})();
</script>

<style>
/* ===== THEME SYSTEM ===== */
:root {
  --bg:#ffffff;
  --bg2:#f5f5f5;
  --primary:#22D3EE; --primary-dark:#06B6D4;
  --secondary:#34D399;
  --text:#111111; --text2:#555555;
  --card:rgba(0,0,0,0.04);
  --border:rgba(0,0,0,0.08);
  --radius:16px;
  --shadow:0 4px 20px rgba(0,0,0,0.08);
  --tr:0.22s ease;
  --header-bg:rgba(255,255,255,0.97);
  --nav-bg:rgba(255,255,255,0.97);
  --input-bg:rgba(0,0,0,0.06);
  --input-border:rgba(0,0,0,0.12);
  --select-bg:rgba(0,0,0,0.05);
}
[data-theme="dark"] {
  --bg:#0B1220;
  --bg2:#0F172A;
  --text:#E2E8F0; --text2:#94A3B8;
  --card:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --shadow:0 4px 20px rgba(0,0,0,0.3);
  --header-bg:rgba(11,18,32,0.94);
  --nav-bg:rgba(11,18,32,0.95);
  --input-bg:rgba(0,0,0,0.25);
  --input-border:rgba(255,255,255,0.08);
  --select-bg:rgba(255,255,255,0.05);
}
html{visibility:hidden;}
html[data-theme]{visibility:visible;}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
html{background:var(--bg);}
body{
  background:linear-gradient(160deg,var(--bg) 0%,var(--bg2) 100%);
  min-height:100vh;
  color:var(--text);
  padding-top:70px;
  padding-bottom:90px;
  animation:fadeIn .3s ease forwards;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* ── FIXED HEADER ── */
.top-bar{
  position:fixed;top:0;left:0;width:100%;
  display:flex;align-items:center;gap:12px;
  padding:12px 20px;
  background:var(--header-bg);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  z-index:1000;
  box-sizing:border-box;
}
.hd-avatar{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:17px;color:#0B1220;
}
.hd-info{flex:1;min-width:0;}
.hd-name{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hd-email{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hd-badge{
  background:rgba(34,211,238,.1);color:var(--primary);
  border:1px solid rgba(34,211,238,.25);
  padding:5px 12px;border-radius:50px;font-size:12px;font-weight:600;flex-shrink:0;
}

/* ── CONTAINER ── */
.wrap{max-width:440px;margin:0 auto;padding:12px 16px 24px;}

/* ── CARD ── */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  box-shadow:var(--shadow);
  margin-bottom:14px;
}

/* ── SECTION TITLE ── */
.sec-title{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:18px;
}
.sec-title-left{
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:700;color:var(--primary);
  text-transform:uppercase;letter-spacing:.6px;
}
.edit-btn{
  display:flex;align-items:center;gap:6px;
  background:rgba(34,211,238,.08);
  border:1px solid rgba(34,211,238,.2);
  color:var(--primary);
  font-size:12px;font-weight:600;
  padding:5px 12px;border-radius:50px;
  cursor:pointer;transition:var(--tr);
}
.edit-btn:hover{background:rgba(34,211,238,.15);}
.edit-btn:active{transform:scale(.97);}

/* ── VIEW MODE ── */
#viewMode{display:block;}

.vm-name-row{
  display:flex;align-items:center;gap:12px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;padding:12px 14px;
  margin-bottom:14px;
}
.vm-avatar{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:16px;color:#0B1220;
}
.vm-name-info{flex:1;min-width:0;}
.vm-name-label{font-size:11px;color:var(--text2);}
.vm-name-val{font-size:15px;font-weight:600;color:var(--text);}

/* NTA card */
.nta-card{
  background:rgba(0,48,135,.1);
  border:1px solid rgba(0,48,135,.35);
  border-radius:14px;
  padding:13px 14px;
  margin-bottom:14px;
  display:flex;align-items:center;gap:12px;
}
[data-theme="light"] .nta-card{
  background:rgba(0,48,135,.06);
  border-color:rgba(0,48,135,.25);
}
.nta-logo{
  width:46px;height:46px;flex-shrink:0;
  object-fit:contain;border-radius:8px;
  background:white;padding:3px;
}
.nta-fallback{
  width:46px;height:46px;flex-shrink:0;border-radius:50%;
  background:#003087;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:white;letter-spacing:.5px;
}
.nta-info{flex:1;}
.nta-exam-name{font-size:14px;font-weight:700;color:var(--text);}
.nta-badges{display:flex;gap:6px;margin-top:4px;}
.badge-nta{
  font-size:10px;font-weight:700;
  background:rgba(0,48,135,.5);border:1px solid rgba(100,149,237,.4);
  color:#93C5FD;padding:2px 8px;border-radius:50px;
}
.badge-year{
  font-size:10px;font-weight:700;
  background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);
  color:#FBBF24;padding:2px 8px;border-radius:50px;
}

/* Days left chip */
.days-chip{
  display:flex;align-items:center;gap:10px;
  background:rgba(251,191,36,.07);
  border:1px solid rgba(251,191,36,.22);
  border-radius:12px;padding:12px 16px;
  margin-bottom:14px;
}
[data-theme="light"] .days-chip{
  background:rgba(251,191,36,.06);
  border-color:rgba(251,191,36,.3);
}
.days-big{
  font-size:34px;font-weight:800;
  background:linear-gradient(135deg,#22D3EE,#06B6D4);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;line-height:1;
}
.days-right{display:flex;flex-direction:column;gap:2px;}
.days-label{font-size:11px;color:var(--text2);font-weight:500;}
.days-exam{font-size:13px;font-weight:600;color:var(--text);}
.days-date{font-size:11px;color:var(--text2);}

/* Notif row in view mode */
.notif-allow-row{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:rgba(251,191,36,.06);
  border:1px solid rgba(251,191,36,.18);
  border-radius:12px;padding:11px 14px;
  margin-bottom:4px;
}
.notif-row-text{
  display:flex;align-items:center;gap:8px;
  font-size:13px;color:var(--text2);font-weight:500;
}
.notif-toggle-btn{
  background:linear-gradient(135deg,#FBBF24,#F59E0B);
  color:#0B1220;border:none;
  border-radius:50px;padding:6px 16px;
  font-size:12px;font-weight:700;cursor:pointer;
  white-space:nowrap;transition:var(--tr);
}
.notif-toggle-btn:active{transform:scale(.97);}

/* ── EDIT MODE ── */
#editMode{display:none;}

.input-label{
  display:block;font-size:12px;color:var(--text2);
  font-weight:500;margin-bottom:6px;letter-spacing:.3px;
}
.edtech-input,.edtech-select{
  width:100%;padding:12px 16px;border-radius:12px;
  border:1px solid var(--input-border);
  background:var(--input-bg);color:var(--text);
  font-size:14px;outline:none;margin-bottom:14px;
  font-family:'Poppins',sans-serif;box-sizing:border-box;
  transition:var(--tr);-webkit-appearance:none;appearance:none;
}
.edtech-input:focus,.edtech-select:focus{
  border-color:rgba(34,211,238,.5);
  box-shadow:0 0 0 3px rgba(34,211,238,.08);
}
.edtech-input::placeholder{color:var(--text2);}
.edtech-select option{
  background:var(--bg2);color:var(--text);
}

.fixed-date-chip{
  width:100%;padding:12px 16px;border-radius:12px;
  border:1px solid rgba(34,211,238,.3);
  background:rgba(34,211,238,.05);
  color:var(--primary);font-size:14px;font-weight:600;
  margin-bottom:14px;display:flex;align-items:center;gap:8px;
}

.save-btn{
  width:100%;padding:14px;border:none;border-radius:50px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#0B1220;font-weight:700;font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 16px rgba(34,211,238,.25);transition:var(--tr);
  margin-top:4px;
}
.save-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(34,211,238,.35);}
.save-btn:active{transform:scale(.97);}

/* Success toast */
.toast{
  display:none;
  margin-top:12px;padding:10px 16px;
  background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);
  border-radius:10px;color:var(--secondary);
  font-size:13px;font-weight:600;text-align:center;
}

/* ── ACTION CARDS ── */
.sub-card{
  background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.25);
  color:#FBBF24 !important;padding:14px 20px;border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;gap:10px;
  text-decoration:none;font-weight:600;font-size:14px;transition:var(--tr);
  margin-bottom:14px;
}
.sub-card:hover{background:rgba(251,191,36,.1);}
.sub-card:active{transform:scale(.97);}

.logout-btn{
  background:rgba(244,63,94,.06);border:1px solid rgba(244,63,94,.25);
  color:#F87171;width:100%;padding:14px;border-radius:var(--radius);
  font-weight:600;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:var(--tr);margin-bottom:14px;
}
.logout-btn:hover{background:rgba(244,63,94,.1);}
.logout-btn:active{transform:scale(.97);}

/* ── FOLLOW ── */
.follow-section{text-align:center;padding:4px 0 0;}
.follow-section p{
  margin-bottom:12px;font-size:12px;font-weight:600;
  color:var(--text2);text-transform:uppercase;letter-spacing:.5px;
}
.social-row{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;}
.yt-card{
  background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.3);
  border-radius:50px;padding:9px 18px;display:inline-flex;align-items:center;
  gap:8px;color:#ff4757 !important;text-decoration:none;
  font-weight:600;font-size:13px;transition:var(--tr);
}
.yt-card:active{transform:scale(.97);}
.contact-card{
  background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.3);
  border-radius:50px;padding:9px 18px;display:inline-flex;align-items:center;
  gap:8px;color:var(--primary) !important;text-decoration:none;
  font-weight:600;font-size:13px;transition:var(--tr);
}
.contact-card:active{transform:scale(.97);}

.made-line{
  font-family:'Playfair Display',serif;font-size:13px;
  font-style:italic;text-align:center;color:var(--text2);padding:14px 0 4px;
}

/* ── BOTTOM NAV ── */
.pwa-bottom-nav{
  position:fixed;bottom:0;left:0;width:100%;height:64px;
  background:var(--nav-bg);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  display:flex;justify-content:space-around;align-items:center;
  z-index:2000;border-top:1px solid var(--border);
}
.pwa-bottom-nav a{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-decoration:none;color:var(--text2);font-size:11px;
  gap:4px;padding:6px 12px;border-radius:12px;transition:var(--tr);min-width:52px;
}
.pwa-bottom-nav a i{font-size:18px;}
.pwa-bottom-nav a.active{color:var(--primary);}
.pwa-bottom-nav a .fa-youtube{color:#ff4757!important;}

/* ── LOADING STATE ── */
#loadingState{
  text-align:center;padding:40px 20px;color:var(--text2);font-size:14px;
}
.spinner{
  width:32px;height:32px;border-radius:50%;
  border:3px solid rgba(34,211,238,.2);
  border-top-color:var(--primary);
  animation:spin .7s linear infinite;
  margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Light mode specific fixes */
[data-theme="light"] .top-bar{
  box-shadow:0 2px 12px rgba(0,0,0,0.08);
}
[data-theme="light"] .pwa-bottom-nav{
  box-shadow:0 -1px 0 rgba(0,0,0,0.08);
}
[data-theme="light"] .card{
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
}
</style>
</head>
<body>

<div class="wrap">

    <!-- ══ VIEW MODE ══ -->
    <div id="viewMode">

  <!-- Subscription -->

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const cfg = {
  apiKey:"AIzaSyB_13GJOiLQwxsirfJ7T_4WinaxVmSp7fs",
  authDomain:"untitled-world-2e645.firebaseapp.com",
  projectId:"untitled-world-2e645",
  storageBucket:"untitled-world-2e645.firebasestorage.app",
  messagingSenderId:"990115586087",
  appId:"1:990115586087:web:963f68bd59dec5ef0c6e02"
};
const app  = initializeApp(cfg);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── EXAM CONFIG ── (correct NTA dates)
const EXAMS = {
  JEE:    { date:"2026-04-02", label:"2 Apr 2026",  name:"JEE Main 2026",  nta:true  },
  NEET:   { date:"2026-05-03", label:"3 May 2026",  name:"NEET UG 2026",   nta:true  },
  CUET:   { date:"2026-05-11", label:"11 May 2026", name:"CUET UG 2026",   nta:true  },
  Boards: { date:"2026-02-15", label:"15 Feb 2026", name:"Board Exams",    nta:false }
};

let currentUser = null;
let profileData = {};



// ── WAIT FOR AUTH → THEN LOAD FROM FIRESTORE ──
onAuthStateChanged(auth, async (user) => {
  if(!user){
    window.location.replace("login.html");
    return;
  }
  currentUser = user;

  // Try loading from Firestore first (survives reinstall)
  try {
    const snap = await getDoc(doc(db, "users", user.uid));
    if(snap.exists()){
      profileData = snap.data();
    }
  } catch(e){ console.log("Firestore load:", e); }

  // Fallback to displayName from Google if no stored name
  const name     = profileData.displayName || user.displayName || "User";
  const email    = profileData.email       || user.email       || "";
  const goal     = profileData.goal        || localStorage.getItem("goal") || "JEE";
  const examDate = profileData.examDate    || localStorage.getItem("examDate") || (EXAMS[goal]?.date || "");

  // Cache locally for speed
  localStorage.setItem("userName",  name);
  localStorage.setItem("userEmail", email);
  localStorage.setItem("goal",      goal);
  if(examDate) localStorage.setItem("examDate", examDate);

  profileData = { ...profileData, displayName:name, email, goal, examDate };

  renderProfile(name, email, goal, examDate);
});

// ── RENDER PROFILE (VIEW MODE) ──
function renderProfile(name, email, goal, examDate){
  // Header
  document.getElementById("hdAvatar").innerText = name.charAt(0).toUpperCase();
  document.getElementById("hdName").innerText   = name;
  document.getElementById("hdEmail").innerText  = email;
  document.getElementById("hdBadge").innerText  = goal;

  // View mode fields
  document.getElementById("vmAvatar").innerText = name.charAt(0).toUpperCase();
  document.getElementById("vmName").innerText   = name;

  // NTA card
  const info = EXAMS[goal];
  const ntaCard = document.getElementById("vmNtaCard");
  if(info.nta){
    ntaCard.style.display = "flex";
    document.getElementById("vmExamName").innerText = info.name;
  } else {
    ntaCard.style.display = "none";
  }

  // Days chip
  renderDaysChip(goal, examDate);

  // Notification row — hide if already granted
  checkNotifRow();

  // Show card, hide loader
  document.getElementById("loadingState").style.display = "none";
  document.getElementById("profileCard").style.display  = "block";
}

function renderDaysChip(goal, examDate){
  const chip = document.getElementById("vmDaysChip");
  const date = examDate || EXAMS[goal]?.date;
  if(!date){ chip.style.display="none"; return; }

  const examTs  = new Date(date); examTs.setHours(0,0,0,0);
  const todayTs = new Date();     todayTs.setHours(0,0,0,0);
  const diff    = Math.ceil((examTs - todayTs) / 86400000);

  if(diff <= 0){ chip.style.display="none"; return; }

  chip.style.display = "flex";
  document.getElementById("vmDaysBig").innerText   = diff;
  document.getElementById("vmDaysExam").innerText  = EXAMS[goal]?.name || goal;
  document.getElementById("vmDaysDate").innerText  = EXAMS[goal]?.label || date;
}

function checkNotifRow(){
  const row = document.getElementById("notifAllowRow");
  // Hide if already granted OR if not PWA
  const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if(!isPWA || Notification.permission === "granted"){
    row.style.display = "none";
  } else {
    row.style.display = "flex";
  }
}

// ── OPEN EDIT MODE ──
window.openEdit = function(){
  const name  = profileData.displayName || "";
  const goal  = profileData.goal        || "JEE";
  const eDate = profileData.examDate    || "";

  document.getElementById("editName").value  = name;
  document.getElementById("editGoal").value  = goal;

  document.getElementById("viewMode").style.display = "none";
  document.getElementById("editMode").style.display = "block";
  document.getElementById("editBtn").innerHTML      = '<i class="fa-solid fa-xmark"></i> Cancel';
  document.getElementById("editBtn").onclick        = cancelEdit;

  onGoalChange(eDate);
};

window.cancelEdit = function(){
  document.getElementById("editMode").style.display = "none";
  document.getElementById("viewMode").style.display = "block";
  document.getElementById("editBtn").innerHTML      = '<i class="fa-solid fa-pen"></i> Edit';
  document.getElementById("editBtn").onclick        = openEdit;
};

// ── GOAL CHANGE IN EDIT MODE ──
window.onGoalChange = function(prefillDate){
  const goal       = document.getElementById("editGoal").value;
  const jeePicker  = document.getElementById("jeePicker");
  const brdPicker  = document.getElementById("boardsPicker");
  const fixedChip  = document.getElementById("fixedDateChip");
  const dateLabel  = document.getElementById("editDateLabel");

  jeePicker.style.display = "none";
  brdPicker.style.display = "none";
  fixedChip.style.display = "none";
  dateLabel.style.display = "none";

  const saved = prefillDate || profileData.examDate || "";

  if(goal === "JEE"){
    dateLabel.style.display = "block";
    jeePicker.style.display = "block";
    // JEE Jan session = Jan 21, Apr session = Apr 2 — allow both ranges
    jeePicker.min = "2026-01-21";
    jeePicker.max = "2026-04-20";
    jeePicker.value = (saved && saved >= "2026-01-01") ? saved : "2026-04-02";
  } else if(goal === "Boards"){
    dateLabel.style.display = "block";
    brdPicker.style.display = "block";
    brdPicker.value = saved || "2026-02-15";
  } else {
    const info = EXAMS[goal];
    if(info.label){
      dateLabel.style.display = "block";
      fixedChip.style.display = "flex";
      fixedChip.innerHTML = `<i class="fa-solid fa-calendar-check"></i> ${info.label}`;
    }
  }
};

// ── SAVE ──
window.saveProfile = async function(){
  const newName = document.getElementById("editName").value.trim();
  const goal    = document.getElementById("editGoal").value;
  if(!newName) {
    document.getElementById("editName").style.borderColor = "rgba(244,63,94,.6)";
    setTimeout(()=>{ document.getElementById("editName").style.borderColor = ""; }, 1500);
    return;
  }

  let examDate = "";
  if(goal === "JEE")       examDate = document.getElementById("jeePicker").value  || EXAMS.JEE.date;
  else if(goal==="Boards") examDate = document.getElementById("boardsPicker").value || EXAMS.Boards.date;
  else                     examDate = EXAMS[goal]?.date || "";

  // Update local state
  profileData.displayName = newName;
  profileData.goal        = goal;
  profileData.examDate    = examDate;

  // localStorage cache
  localStorage.setItem("userName",  newName);
  localStorage.setItem("goal",      goal);
  if(examDate) localStorage.setItem("examDate", examDate);

  // ── SAVE TO FIRESTORE (uid as key — survives reinstall) ──
  try {
    await setDoc(doc(db, "users", currentUser.uid), {
      displayName: newName,
      email:       currentUser.email,
      goal:        goal,
      examDate:    examDate,
    }, { merge: true });
  } catch(e){ console.log("Firestore save:", e); }

  // Show success toast
  const toast = document.getElementById("toast");
  toast.innerHTML = '<i class="fa-solid fa-circle-check"></i> Saved successfully!';
  toast.style.display = "block";

  // After 1.5s → hide edit, show view with updated data
  setTimeout(()=>{
    toast.style.display = "none";
    cancelEdit();
    renderProfile(newName, currentUser.email, goal, examDate);
    // Sync header on index.html when navigating back
    window.dispatchEvent(new StorageEvent('storage', { key:'goal', newValue:goal }));
  }, 1500);
};

// ── NOTIFICATION ──
window.enableNotif = async function(){
  try {
    const perm = await Notification.requestPermission();
    if(perm === "granted"){
      localStorage.setItem("examNotifEnabled", "true");
      // Hide the row immediately
      document.getElementById("notifAllowRow").style.display = "none";
      // Fire a test notification
      const goal  = profileData.goal || "JEE";
      const date  = profileData.examDate || EXAMS[goal]?.date;
      const diff  = date ? Math.ceil((new Date(date) - new Date()) / 86400000) : 0;
      new Notification("📚 Untitled World", {
        body: `${EXAMS[goal]?.name || goal} — ${diff > 0 ? diff+" days left! Study hard 🔥" : "Exam time!"}`,
        icon: "/icon-192.png",
        badge:"/icon-192.png"
      });
    }
  } catch(e){ console.log(e); }
};

// ── LOGOUT ──
window.doLogout = function(){
  document.body.style.opacity = "0";
  document.body.style.transition = "opacity .2s ease";
  setTimeout(()=>{
    ["userName","customUserName","userEmail","goal","examDate","seenWelcome","examNotifEnabled"]
      .forEach(k => localStorage.removeItem(k));
    window.location.href = "login.html";
  }, 200);
};
</script>
