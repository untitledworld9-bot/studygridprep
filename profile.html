<!DOCTYPE html>
<html lang="en">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Profile - Untitled World</title>

<style>

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
font-family:Poppins,sans-serif;
color:white;
margin:0;
padding:0;
}

/* HEADER */

.top-bar{

display:flex;
align-items:center;
gap:12px;

padding:18px;

}

.avatar{

width:48px;
height:48px;

border-radius:50%;

background:#4facfe;

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;
font-size:20px;

}

.user-info{

display:flex;
flex-direction:column;

}

.goal-badge{

margin-left:auto;

background:#00f2fe;

color:black;

padding:6px 12px;

border-radius:20px;

font-size:12px;

font-weight:600;

}

/* CARD */

.profile-container{
max-width:420px;
margin:auto;
padding:10px 20px 30px;
}

.profile-card{

background:rgba(255,255,255,0.08);
backdrop-filter:blur(14px);

border-radius:22px;

padding:25px;

box-shadow:0 10px 25px rgba(0,0,0,0.3);

}

.goal-section{

margin-top:20px;

}

.goal-option{

display:flex;
align-items:center;

gap:10px;

margin:12px 0;

font-size:16px;

}

button{

width:100%;

padding:14px;

border:none;

border-radius:14px;

background:linear-gradient(45deg,#00f2fe,#4facfe);

color:white;

font-weight:600;

cursor:pointer;

margin-top:15px;

}

.logout-btn{

background:#e74c3c;

}

/* BOTTOM NAV */

.bottom-nav{

position:fixed;

bottom:0;

left:0;

width:100%;

height:65px;

background:#0f2027;

display:flex;

justify-content:space-around;

align-items:center;

border-top:1px solid rgba(255,255,255,0.1);

}

.bottom-nav a{

display:flex;

flex-direction:column;

align-items:center;

text-decoration:none;

color:white;

font-size:12px;

}

.bottom-nav a.active{

color:#00f2fe;

}

.follow-section{
margin-top:40px;
text-align:center;
}

.follow-section p{
margin-bottom:12px;
font-weight:600;
font-size:18px;
}

.yt-link{
color:white;
text-decoration:none;
border-bottom:1.5px dotted rgba(255,255,255,0.6);
padding-bottom:3px;
font-size:18px;
}

.yt-link img{
width:18px;
vertical-align:middle;
margin-right:6px;
}

.made-line{
margin-top:15px;
margin-bottom:90px;
font-family:'Playfair Display', serif;
font-size:18px;
font-style:italic;
font-weight:500;
text-align:center;
opacity:0.9;
}

body{
padding-bottom:70px;
}

</style>
</head>

<body>

<!-- TOP PROFILE BAR -->

<div class="top-bar">

<div class="avatar" id="avatar">A</div>

<div class="user-info">

<div id="userName">User</div>

<div style="font-size:12px;opacity:.7;" id="userEmail">email@gmail.com</div>

</div>

<div id="goalBadge" class="goal-badge">No Goal</div>

</div>


<div class="profile-container">

<div class="profile-card">

<h3>Select Your Goal</h3>

<label class="goal-option">
<input type="radio" name="goal" value="JEE"> JEE
</label>

<label class="goal-option">
<input type="radio" name="goal" value="NEET"> NEET
</label>

<label class="goal-option">
<input type="radio" name="goal" value="Boards"> Boards
</label>

<button onclick="saveGoal()">Save Goal</button>
<div id="msg" style="color:#00ff88;margin-top:10px;"></div>

<button class="logout-btn" onclick="logout()">Logout</button>

</div>

</div>

<div class="follow-section">

<p>Follow us on</p>

<a href="https://youtube.com/@untitledworld01" target="_blank" class="yt-link">

<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">

Untitled World

</a>

</div>

<p class="made-line">

Crafted with <span>❤️</span> for Focused Learners

</p>


<!-- BOTTOM NAV -->

<div class="bottom-nav">

<a href="index.html">🔳<span>Home</span></a>

<a href="mocktest.html">📝<span>Mock</span></a>

<a href="timer.html">⏳<span>Focus</span></a>

<a href="playlist.html">

<i class="fa-brands fa-youtube" style="color:red;font-size:16px;margin-right:5px;"></i>

<span>Playlist</span>

</a>

<a href="profile.html" class="active">👤<span>Profile</span></a>

</div>


<script>

let name=localStorage.getItem("userName")||"User";
let email=localStorage.getItem("userEmail")||"user@gmail.com";

document.getElementById("userName").innerText=name;
document.getElementById("userEmail").innerText=email;
document.getElementById("avatar").innerText=name.charAt(0).toUpperCase();

let savedGoal=localStorage.getItem("goal");

if(savedGoal){

document.getElementById("goalBadge").innerText=savedGoal;

document.querySelector(`input[value="${savedGoal}"]`).checked=true;

}

function saveGoal(){

let goal=document.querySelector('input[name="goal"]:checked');

if(!goal){
alert("Select goal");
return;
}

localStorage.setItem("goal",goal.value);

document.getElementById("goalBadge").innerText=goal.value;

document.getElementById("msg").innerText="Goal saved successfully ✔";

}

function logout(){

localStorage.removeItem("loggedIn");

window.location="login.html";

}

if(!window.matchMedia('(display-mode: standalone)').matches){
window.location.href="index.html";
}

</script>

</body>
</html>
