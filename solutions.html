<!-- AUTH GATE -->
<script>
(function(){
  var isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if(isPWA && !localStorage.getItem("userName")){
    document.documentElement.style.display='none';
    window.location.replace("login.html");
  }
})();
</script>

<!-- THEME — instant -->
<script>
(function(){
  var saved = localStorage.getItem("theme");
  var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.documentElement.setAttribute("data-theme", saved || (systemDark ? "dark" : "light"));
})();
</script>
<style>html{ visibility:hidden; } html[data-theme]{ visibility:visible; }</style>

<!-- MathJax — same as mock.html -->
<script>
window.MathJax = {
  tex: {
    inlineMath:  [['\\(','\\)'], ['$','$']],
    displayMath: [['\\[','\\]'], ['$$','$$']],
    packages: {'[+]': ['base', 'ams', 'boldsymbol']},
    tags: 'none'
  },
  options: {
    skipHtmlTags: ['script','noscript','style','textarea','pre'],
    processHtmlClass: 'math-render',
    menuOptions: { settings: { zoom: 'None' } }
  },
  startup: { typeset: false }
};
document.addEventListener('contextmenu', function(e) {
  if (e.target && e.target.closest && e.target.closest('mjx-container')) e.preventDefault();
}, true);
// Block long-press MathJax popup on mobile
document.addEventListener('touchstart', function(e) {
  if (e.target && e.target.closest && e.target.closest('mjx-container')) {
    e.stopPropagation();
  }
}, true);
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" crossorigin="anonymous" async></script>

<style>
/* ============================================================
   DESIGN TOKENS
============================================================ */
:root {
  --bg-start:       #f8fafc;
  --bg-end:         #eef2f7;
  --primary:        #0ea5e9;
  --primary-dark:   #0284c7;
  --secondary:      #10b981;
  --accent:         #F43F5E;
  --text-primary:   #1e293b;
  --text-secondary: #64748b;
  --card-bg:        #ffffff;
  --card-border:    #e2e8f0;
  --header-bg:      #ffffff;
  --glass-bg:       #f8fafc;
  --radius:         12px;
  --shadow:         0 1px 8px rgba(0,0,0,0.08);
  --green:          #10B981;
  --red:            #EF4444;
}
[data-theme="dark"] {
  --bg-start:       #0f172a;
  --bg-end:         #1e293b;
  --text-primary:   #f1f5f9;
  --text-secondary: #94a3b8;
  --card-bg:        #1e293b;
  --card-border:    #334155;
  --header-bg:      #0f172a;
  --glass-bg:       #1e293b;
  --shadow:         0 4px 20px rgba(0,0,0,0.40);
}

*, *::before, *::after {
  margin:0; padding:0; box-sizing:border-box;
  font-family:'Poppins', sans-serif;
  -webkit-tap-highlight-color: transparent;
}

html { background:var(--bg-start); height:100%; overflow:hidden; }

body {
  background: var(--bg-end);
  color: var(--text-primary);
  display: flex; flex-direction: column;
  height: 100%; height: 100dvh;
  overflow: hidden;
  user-select: none; -webkit-user-select: none;
  overscroll-behavior-y: none;
}

/* PAGE TRANSITION */
#pageTransition {
  position:fixed; inset:0; background:var(--bg-start);
  z-index:99999; opacity:0; pointer-events:none;
  transition:opacity 0.22s ease;
}
#pageTransition.leaving { opacity:1; pointer-events:all; }

/* ── HEADER ── */
header {
  display:flex; align-items:center;
  padding:10px 16px;
  background: var(--header-bg);
  border-bottom: 1px solid var(--card-border);
  flex-shrink:0; z-index:900; gap:10px; min-height:56px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

.hdr-back {
  width:34px; height:34px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  background:var(--card-bg); border:1.5px solid var(--card-border);
  color:var(--text-secondary); font-size:14px;
  cursor:pointer; flex-shrink:0; transition:all 0.18s;
}
.hdr-back:hover { background:var(--primary); color:#fff; border-color:var(--primary); }

.hdr-center { flex:1; text-align:center; }
.hdr-title  { font-size:clamp(13px,3.5vw,16px); font-weight:700; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.hdr-sub    { font-size:10px; color:var(--text-secondary); font-weight:500; }

.hdr-counter {
  font-size:12px; font-weight:600; color:var(--text-secondary);
  background:var(--card-bg); border:1.5px solid var(--card-border);
  padding:4px 12px; border-radius:99px; white-space:nowrap; flex-shrink:0;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

/* ── QUESTION PANEL ── */
#questionPanel {
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding:14px 14px calc(140px + env(safe-area-inset-bottom));
  -webkit-overflow-scrolling:touch; scroll-behavior:smooth;
}
#questionPanel::-webkit-scrollbar { width:3px; }
#questionPanel::-webkit-scrollbar-thumb { background:var(--card-border); border-radius:99px; }

/* ── QUESTION CARD ── */
.question-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding:20px; margin-bottom:14px;
  animation: qIn 0.25s ease;
  box-shadow: var(--shadow);
}
@keyframes qIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }

.q-header {
  display:flex; align-items:center; gap:10px;
  margin-bottom:14px; flex-wrap:wrap;
}
.q-num { font-size:12px; font-weight:700; color:var(--primary); text-transform:uppercase; }
.q-subj-badge {
  font-size:10px; font-weight:600; padding:3px 9px; border-radius:99px;
  background:rgba(34,211,238,0.09); border:1px solid rgba(34,211,238,0.2);
  color:var(--primary);
}

/* ── QUESTION TEXT ── */
.q-text {
  font-size:14px; line-height:1.8; color:var(--text-primary);
  margin-bottom:16px; user-select:text; -webkit-user-select:text;
  word-break:break-word; overflow-wrap:break-word;
  overflow-x:auto; max-width:100%; white-space:normal;
}

/* Math overflow fix — inline math must stay inline-block */
mjx-container[jax="CHTML"] {
  display: inline-block !important;
  vertical-align: middle !important;
  max-width: 100% !important;
  overflow-x: auto !important;
  line-height: 1.4 !important;
  margin: 0 1px !important;
}
mjx-container[jax="CHTML"][display="true"] {
  display: block !important;
  overflow-x: auto !important;
  overflow-y: hidden !important;
  margin: 8px 0 !important;
  max-width: 100% !important;
}
.MathJax { max-width: 100% !important; }
/* FIX: Remove underlines/text-decoration that some browsers inherit into MathJax */
mjx-container, mjx-container * {
  text-decoration: none !important;
  border-bottom: none !important;
}
.math-render {
  max-width: 100%;
  overflow-wrap: break-word;
  word-break: break-word;
  white-space: normal;
  line-height: 1.8;
}
.question-card .match-table-wrap { max-width:100%; overflow-x:auto; }
.question-card .match-table-wrap table { width:100%; border-collapse:collapse; table-layout:fixed; }
.question-card td, .question-card th { word-break:break-word; overflow-wrap:break-word; }

/* ── OPTIONS ── */
.options-list { display:flex; flex-direction:column; gap:10px; }

.option-item {
  display:flex; align-items:flex-start; gap:12px;
  padding:12px 14px;
  background: var(--card-bg);
  border:1.5px solid var(--card-border);
  border-radius:10px;
  position:relative;
  user-select:none;
  transition: all 0.18s;
}

/* Correct option: green */
.option-item.correct {
  background: rgba(16,185,129,0.06);
  border-color: #10B981;
}

/* Chosen wrong option: red */
.option-item.chosen-wrong {
  background: rgba(239,68,68,0.06);
  border-color: #EF4444;
}

.opt-letter {
  width:30px; height:30px; border-radius:50%;
  background:var(--glass-bg); border:1.5px solid var(--card-border);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700; color:var(--text-secondary);
  flex-shrink:0; transition:all 0.18s;
}
.option-item.correct .opt-letter {
  background:#10B981; border-color:#10B981; color:#fff;
}
.option-item.chosen-wrong .opt-letter {
  background:#EF4444; border-color:#EF4444; color:#fff;
}

.opt-text { font-size:13px; line-height:1.6; color:var(--text-primary); flex:1; }

/* Result badge below option */
.opt-result-badge {
  font-size:10px; font-weight:700; margin-top:4px; display:flex; align-items:center; gap:4px;
}
.badge-correct { color:#10B981; }
.badge-wrong   { color:#EF4444; }

/* Status box at bottom of card */
.q-result-box {
  margin-top:14px; padding:10px 14px; border-radius:10px;
  font-size:12px; font-weight:600; display:flex; align-items:center; gap:8px;
}
.q-result-box.correct { background:rgba(16,185,129,0.08); border:1px solid rgba(16,185,129,0.2); color:#10B981; }
.q-result-box.wrong   { background:rgba(239,68,68,0.08);  border:1px solid rgba(239,68,68,0.2);  color:#EF4444; }
.q-result-box.skipped { background:rgba(156,163,175,0.08); border:1px solid rgba(156,163,175,0.2); color:var(--text-secondary); }

/* ── CONTROLS BAR (only Next / Back) ── */
#controlsBar {
  position:fixed; bottom:0; left:0; right:0; z-index:800;
  padding:10px 14px calc(10px + env(safe-area-inset-bottom));
  background:var(--header-bg);
  border-top:1px solid var(--card-border);
  display:flex; gap:10px;
  box-shadow: 0 -1px 8px rgba(0,0,0,0.06);
}

.ctrl-btn {
  flex:1; padding:12px 16px;
  border-radius:10px; border:none;
  font-size:13px; font-weight:600; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition:all 0.18s;
}
.ctrl-btn:active { transform:scale(0.96); }

.btn-back-sol {
  background:var(--card-bg); border:1.5px solid var(--card-border);
  color:var(--text-primary);
}
.btn-prev-sol {
  background:var(--card-bg); border:1.5px solid var(--card-border);
  color:var(--text-secondary);
  flex:0.85;
}
.btn-prev-sol:disabled {
  opacity:0.35;
  cursor:not-allowed;
}
.btn-next-sol {
  background:var(--primary);
  color:#fff;
  box-shadow:0 2px 8px rgba(14,165,233,0.30);
}

/* ── EMPTY / LOADING ── */
.no-data {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:60px 20px; text-align:center; gap:14px;
}
.no-data-icon { font-size:48px; opacity:0.3; }
.no-data-title { font-size:17px; font-weight:700; }
.no-data-sub { font-size:13px; color:var(--text-secondary); line-height:1.6; }
.no-data-btn {
  margin-top:8px; padding:11px 24px;
  background:var(--primary); color:#0B1220;
  border:none; border-radius:12px;
  font-size:13px; font-weight:700; cursor:pointer;
}

/* ── AI DETAILED ANSWER ── */
.ai-answer-btn {
  width:100%; margin-top:12px; padding:11px 16px;
  border:none; border-radius:10px;
  background: linear-gradient(135deg, rgba(139,92,246,0.12) 0%, rgba(34,211,238,0.12) 100%);
  border:1.5px solid rgba(139,92,246,0.25);
  color:#8B5CF6; font-family:'Poppins',sans-serif;
  font-size:12px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:7px;
  transition:all 0.18s;
  -webkit-tap-highlight-color:transparent;
}
[data-theme="dark"] .ai-answer-btn {
  background: linear-gradient(135deg, rgba(139,92,246,0.15) 0%, rgba(34,211,238,0.10) 100%);
  border-color: rgba(139,92,246,0.30);
}
.ai-answer-btn:active { transform:scale(0.97); }
.ai-answer-btn.loading {
  opacity:0.7; pointer-events:none;
}

.ai-answer-box {
  margin-top:12px; border-radius:12px;
  border:1.5px solid rgba(139,92,246,0.22);
  background: linear-gradient(135deg, rgba(139,92,246,0.05) 0%, rgba(34,211,238,0.04) 100%);
  overflow:hidden;
  animation: aiBoxIn 0.28s ease;
}
@keyframes aiBoxIn {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.ai-answer-header {
  display:flex; align-items:center; gap:8px;
  padding:10px 14px;
  border-bottom:1px solid rgba(139,92,246,0.12);
  font-size:11px; font-weight:700; color:#8B5CF6;
  letter-spacing:0.04em; text-transform:uppercase;
}
.ai-answer-header .ai-dot {
  width:6px; height:6px; border-radius:50%; background:#8B5CF6;
  animation: pulse-dot 1.4s ease infinite;
  flex-shrink:0;
}
.ai-answer-content {
  padding:14px;
  font-size:13px; line-height:1.75; color:var(--text-primary);
  white-space:pre-wrap; word-break:break-word;
}
.ai-answer-content strong, .ai-answer-content b {
  color:var(--primary); font-weight:700;
}
.ai-answer-loading {
  padding:18px 14px; text-align:center;
  font-size:12px; color:var(--text-secondary); font-weight:500;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.ai-spinner {
  width:14px; height:14px; border-radius:50%;
  border:2px solid rgba(139,92,246,0.2);
  border-top-color:#8B5CF6;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── AI SCROLL HINT POPUP ── */
#aiScrollHint {
  position:fixed; bottom:90px; right:14px; z-index:8000;
  display:flex; align-items:center; gap:7px;
  background:var(--header-bg);
  border:1.5px solid rgba(139,92,246,0.30);
  border-radius:99px; padding:8px 14px;
  box-shadow:0 4px 16px rgba(139,92,246,0.18);
  cursor:pointer; transition:all 0.22s;
  animation:hintIn 0.3s ease;
  -webkit-tap-highlight-color:transparent;
  max-width:240px;
}
#aiScrollHint:active { transform:scale(0.95); }
@keyframes hintIn {
  from { opacity:0; transform:translateY(10px) scale(0.95); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
.hint-arrow { font-size:14px; animation:bounce 1s ease infinite; }
@keyframes bounce {
  0%,100% { transform:translateY(0); }
  50%      { transform:translateY(-3px); }
}
.hint-text { font-size:11px; font-weight:700; color:#8B5CF6; white-space:nowrap; }

/* Toast */
#toastWrap {
  position:fixed; bottom:120px; left:50%;
  transform:translateX(-50%); z-index:9999;
  display:flex; flex-direction:column; align-items:center; gap:8px;
  pointer-events:none;
}
.toast-msg {
  background:var(--text-primary); color:var(--bg-start);
  padding:9px 18px; border-radius:99px;
  font-size:12px; font-weight:600;
  animation:toastIn 0.22s ease, toastOut 0.22s ease 1.8s forwards;
  white-space:nowrap;
}
@keyframes toastIn  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes toastOut { from{opacity:1} to{opacity:0;transform:translateY(-6px)} }
</style>

<script>
/* ============================================================
   SOLUTIONS PAGE
   Reads lastTestResult from localStorage (written by mock.html).
   Also re-fetches questions from Firestore to get correct answers
   and question text for each question.
============================================================ */

window.navigate = function(url) {
  const v = document.getElementById('pageTransition');
  if (v) v.classList.add('leaving');
  setTimeout(() => { window.location.href = url; }, 210);
};

window.goBack = function() {
  // Flag so result-analysis knows we are returning — use cached result, not fresh localStorage
  sessionStorage.setItem("returnFromSolutions", "1");
  navigate("result-analysis.html");
};

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast-msg';
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

/* ── Full math renderer — same as mock.html ── */
function prepareMathHtml(raw) {
  if (!raw) return '';

  // Step 0a: Fill-in-the-blank underscores → styled blank line (real exam style)
  let processed0 = raw.replace(/_{4,}/g, () =>
    `<span style="display:inline-block;min-width:80px;border-bottom:2px solid var(--text-primary);margin:0 3px;vertical-align:bottom;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>`
  );

  // Step 0b: Single-quoted 'word' → underlined highlight (underlined word questions)
  processed0 = processed0.replace(/'([^']{1,50})'/g, (match, word) => {
    if (/^(t|s|re|ve|ll|d|m)$/.test(word.trim())) return match;
    return `<span style="text-decoration:underline;font-weight:600;color:var(--text-primary);">${word}</span>`;
  });

  const imgPlaceholders = [];
  const imgRe = /(https?:\/\/\S+\.(?:png|jpg|jpeg|gif|webp|svg)(?:\?[^\s]*)?)/gi;
  let processed = processed0.replace(imgRe, (match) => {
    const idx = imgPlaceholders.length;
    imgPlaceholders.push(`<br><img src="${match}" alt="image" style="max-width:100%;border-radius:8px;margin:8px 0;border:1px solid var(--card-border);" onerror="this.style.display='none'"><br>`);
    return `\x00IMG${idx}\x00`;
  });

  processed = processed.replace(/(\\begin\{[^}]+\}[\s\S]*?\\end\{[^}]+\})/g, m => `\\[${m}\\]`);

  const mathDelimRe = /(\\\[[\s\S]*?\\\]|\\\([\s\S]*?\\\)|\$\$[\s\S]*?\$\$|\$[^$\n]+?\$)/g;
  const parts = [];
  let lastIdx = 0, match;
  mathDelimRe.lastIndex = 0;
  while ((match = mathDelimRe.exec(processed)) !== null) {
    if (match.index > lastIdx) parts.push({ type:'text', val: processed.slice(lastIdx, match.index) });
    parts.push({ type:'math', val: match[0] });
    lastIdx = match.index + match[0].length;
  }
  if (lastIdx < processed.length) parts.push({ type:'text', val: processed.slice(lastIdx) });

  const latexTokenRe = /\\[a-zA-Z]+|[_^]\{[^}]*\}|[_^][^\s{,;)}\]]+|\{[^{}]*\\[a-zA-Z]+[^{}]*\}/;

  const resultParts = parts.map(part => {
    if (part.type === 'math') return part.val;
    const text = part.val;
    const imgPlaceholderRe = /(\x00IMG\d+\x00)/g;
    const subParts = text.split(imgPlaceholderRe);
    return subParts.map(sp => {
      if (/^\x00IMG\d+\x00$/.test(sp)) return sp;
      if (latexTokenRe.test(sp)) {
        // Wrap ONLY individual math tokens — not the whole segment.
        const tokenRe = /(\\[a-zA-Z]+(?:\s*\{[^{}]*\})*|[a-zA-Z0-9]*[_^](?:\{[^{}]*\}|[^\s{,;)}\[\]\\]+))/g;
        let r = '', li = 0, tm;
        tokenRe.lastIndex = 0;
        while ((tm = tokenRe.exec(sp)) !== null) {
          if (tm.index > li) r += escHtml(sp.slice(li, tm.index));
          r += `\\(${tm[0]}\\)`;
          li = tm.index + tm[0].length;
        }
        if (li < sp.length) r += escHtml(sp.slice(li));
        return r;
      }
      const fracRe = /(?<![:/\w])(-?\d+)\/(\d+)(?![\w/])/g;
      const withFrac = sp.replace(fracRe, (_, num, den) => `\\(\\frac{${num}}{${den}}\\)`);
      return escHtml(withFrac);
    }).join('');
  });

  let html = resultParts.join('');
  imgPlaceholders.forEach((imgHtml, idx) => { html = html.replace(`\x00IMG${idx}\x00`, imgHtml); });
  return html;
}

function triggerMathJax(el) {
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([el]).catch(e => console.warn('MathJax error:', e));
  }
}

/* ── Format question text — same as mock.html ── */
function formatQuestionText(raw) {
  if (!raw) return '';
  const text = raw;

  // ── 0. Rearrange sentence questions (English CUET style) ──────────
  if (/rearrange/i.test(text) && /\([A-D]\)/.test(text)) {
    const firstAIdx = text.search(/\([A-D]\)/);
    const instrPart = firstAIdx > 0 ? text.slice(0, firstAIdx).trim() : '';

    const splitRe = /\(([A-D])\)\s*/g;
    const markers = [];
    splitRe.lastIndex = firstAIdx;
    let sm;
    while ((sm = splitRe.exec(text)) !== null) {
      markers.push({ letter: sm[1], start: sm.index + sm[0].length });
    }
    const parts = [];
    markers.forEach((mk, i) => {
      const end = i + 1 < markers.length
        ? text.lastIndexOf('(', markers[i+1].start - 2)
        : text.length;
      let content = text.slice(mk.start, end).replace(/[,;]\s*$/, '').trim();
      if (content.length > 0) parts.push({ letter: mk.letter, content });
    });

    if (parts.length >= 2) {
      let html = '';
      if (instrPart) {
        html += `<div class="math-render" style="margin-bottom:12px;">${prepareMathHtml(instrPart)}</div>`;
      }
      html += `<div style="display:flex;flex-direction:column;gap:7px;">`;
      parts.forEach(p => {
        html += `<div style="display:flex;gap:10px;align-items:flex-start;padding:8px 12px;background:var(--glass-bg);border:1px solid var(--card-border);border-radius:10px;">
          <span style="font-weight:700;color:var(--primary);flex-shrink:0;min-width:22px;">(${p.letter})</span>
          <span class="math-render" style="flex:1;word-break:break-word;font-size:13px;">${prepareMathHtml(p.content)}</span>
        </div>`;
      });
      html += `</div>`;
      return html;
    }
  }

  // ── 1. Match List-I / List-II table ──────────────────────────────
  if (/Match\s+(?:the\s+)?(?:following\s+)?(?:\S+\s+)?\(?\s*List[- ]?I\b/i.test(text) ||
      /\bList[- ]?I\b[\s\S]{0,80}\bList[- ]?II\b/i.test(text)) {

    const listIStart = text.search(/\bList[- ]?I\b/i);
    const listIIIdx  = text.search(/\bList[- ]?II\b/i);

    const beforeListI = listIStart > 0
      ? text.slice(0, listIStart).replace(/Match\s+(?:the\s+)?(?:following\s+)?(?:\S+\s+)?\(?\s*$/i,'').trim()
      : '';
    const mainQ = beforeListI ? prepareMathHtml(beforeListI) : '';

    const listIItems = [];
    const listIRe = /\(([A-D])\)\s*([\s\S]+?)(?=\s*[,;]?\s*\([A-D]\)|\s*[,;]?\s*\((?:I{1,4}V?|VI{0,3}|IX|X|\d+)\)|\bList[- ]?II\b|\bChoose\b|$)/gi;
    let m;
    listIRe.lastIndex = 0;
    while ((m = listIRe.exec(text)) !== null) {
      if (listIIIdx > 0 && m.index >= listIIIdx) break;
      const val = m[2].replace(/[,;.\n]\s*$/, '').replace(/\n/g, ' ').trim();
      if (val && val.length > 1) listIItems.push({ key: m[1].toUpperCase(), val });
    }

    const listIIItems = [];
    const listIIRe = /\((I{1,4}V?|VI{0,3}|IX|X|\d+)\)\s*([\s\S]+?)(?=\s*[,;]?\s*\((?:I{1,4}V?|VI{0,3}|IX|X|\d+)\)|\bChoose\b|$)/gi;
    listIIRe.lastIndex = listIIIdx > 0 ? listIIIdx : 0;
    while ((m = listIIRe.exec(text)) !== null) {
      const val = m[2].replace(/[,;.\n]\s*$/, '').replace(/\n/g, ' ').trim();
      if (val && val.length > 1) listIIItems.push({ key: m[1], val });
    }

    if (listIItems.length > 0 || listIIItems.length > 0) {
      const maxRows = Math.max(listIItems.length, listIIItems.length);
      let tableHtml = `<div style="overflow-x:auto;">`;
      if (mainQ) tableHtml += `<div style="margin-bottom:10px;" class="math-render">${mainQ}</div>`;
      tableHtml += `<div style="font-weight:600;margin-bottom:8px;">Match List-I with List-II</div>
        <table style="width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed;">
          <thead><tr>
            <th style="text-align:left;padding:6px 10px;background:rgba(34,211,238,0.08);border:1px solid var(--card-border);width:50%;word-break:break-word;">List-I</th>
            <th style="text-align:left;padding:6px 10px;background:rgba(34,211,238,0.08);border:1px solid var(--card-border);width:50%;word-break:break-word;">List-II</th>
          </tr></thead><tbody>`;
      for (let r = 0; r < maxRows; r++) {
        const li  = listIItems[r]
          ? `<strong>(${listIItems[r].key})</strong>&nbsp;<span class="math-render">${prepareMathHtml(listIItems[r].val)}</span>`
          : '';
        const lii = listIIItems[r]
          ? `<strong>(${listIIItems[r].key})</strong>&nbsp;<span class="math-render">${prepareMathHtml(listIIItems[r].val)}</span>`
          : '';
        tableHtml += `<tr>
          <td style="padding:7px 10px;border:1px solid var(--card-border);vertical-align:top;word-break:break-word;">${li}</td>
          <td style="padding:7px 10px;border:1px solid var(--card-border);vertical-align:top;word-break:break-word;">${lii}</td>
        </tr>`;
      }
      tableHtml += `</tbody></table></div>`;
      return tableHtml;
    }
  }

  // ── 2. (A)(B)(C)(D) sub-statement list ───────────────────────────
  //    Supports BOTH newline-separated (physics/JEE) and comma-separated (CUET) formats.
  if (/\([A-D]\)/.test(text)) {
    // Newline-separated (physics style)
    const nlItems = [];
    const nlRe = /(?:^|\n)\s*\(([A-D])\)\s+([\s\S]+?)(?=\n\s*\([A-D]\)|\n\s*Choose|\s*$)/g;
    let nlm;
    while ((nlm = nlRe.exec(text)) !== null) {
      const val = nlm[2].replace(/\n/g,' ').replace(/[,;]\s*$/,'').trim();
      if (val.length > 3) nlItems.push({ letter: nlm[1], content: val });
    }

    // Comma/inline-separated (CUET style)
    const inlineItems = [];
    if (nlItems.length < 2) {
      const inlineRe = /\(([A-D])\)\s+(.+?)(?=\s*[,;]\s*\([A-D]\)|\s*Choose\s|\s*$)/g;
      let im;
      while ((im = inlineRe.exec(text)) !== null) {
        const val = im[2].replace(/[,;]\s*$/, '').trim();
        if (val.length > 5) inlineItems.push({ letter: im[1], content: val });
      }
    }

    const items = nlItems.length >= 2 ? nlItems : inlineItems;

    if (items.length >= 2) {
      const firstMatch = text.match(/(?:^|\n)\s*\([A-D]\)\s/);
      const splitIdx = firstMatch ? (firstMatch.index + (firstMatch[0].startsWith('\n') ? 1 : 0)) : -1;
      const mainPart = splitIdx > 0 ? text.slice(0, splitIdx).trim() : '';

      const chooseMatch = text.match(/Choose the correct[^.\n]*[.?\n]?/i);
      const chooseNote = chooseMatch
        ? `<div style="margin-top:10px;font-size:13px;color:var(--text-secondary);">${prepareMathHtml(chooseMatch[0].trim())}</div>`
        : '';

      let html = '';
      if (mainPart) html += `<div class="math-render" style="margin-bottom:10px;">${prepareMathHtml(mainPart)}</div>`;
      html += `<div style="display:flex;flex-direction:column;gap:8px;">`;
      items.forEach(item => {
        html += `<div style="display:flex;gap:8px;align-items:flex-start;">
          <span style="font-weight:700;color:var(--primary);flex-shrink:0;min-width:26px;">(${item.letter})</span>
          <span class="math-render" style="flex:1;word-break:break-word;">${prepareMathHtml(item.content)}</span>
        </div>`;
      });
      html += `</div>${chooseNote}`;
      return html;
    }
  }

  // ── 3. Default: handle newlines gracefully ────────────────────────
  const withBreaks = text.replace(/\n/g, '<br>');
  return prepareMathHtml(withBreaks);
}
function processImageUrls(escapedText) {
  const raw = escapedText.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"');
  return prepareMathHtml(raw);
}

/* ── STATE ── */
const SOL_STATE = {
  allQuestions: [], // [{subject, questionNo, question, options, correctAnswer, type}]
  answers:      {}, // from lastTestResult.answers
  flatList:     [], // flat [{secIdx, qIdx, subject, q, ans}] for navigation
  currentIdx:   0,
};

/* ── LOAD ── */
(async function init() {
  let result = null;
  // Priority: sessionStorage.solutionsData (passed from result-analysis when coming from history)
  //           → localStorage.lastTestResult (direct from mock submit)
  try {
    const fromSession = sessionStorage.getItem('solutionsData');
    if (fromSession) {
      result = JSON.parse(fromSession);
      sessionStorage.removeItem('solutionsData'); // clean up after reading
      // Cache for launchAIFromSolutions to use
      try { sessionStorage.setItem('_solResult', JSON.stringify(result)); } catch(e) {}
    }
  } catch(e) {}
  if (!result) {
    try { result = JSON.parse(localStorage.getItem('lastTestResult') || 'null'); } catch(e){}
  }

  if (!result) {
    document.getElementById('questionContent').innerHTML = `
      <div class="no-data">
        <div class="no-data-icon"><i class="fa-regular fa-circle-xmark"></i></div>
        <div class="no-data-title">No Test Data Found</div>
        <div class="no-data-sub">Please complete a mock test first to view solutions.</div>
        <button class="no-data-btn" onclick="navigate('mock-home.html')">Go to Mock Tests</button>
      </div>`;
    return;
  }

  SOL_STATE.answers = result.answers || {};

  const exam    = (result.exam || 'cuet').toLowerCase();
  const testId  = result.testId || localStorage.getItem('selectedTestId') || '';

  // Update sub header
  const sub = document.getElementById('hdrSub');
  if (sub) sub.textContent = `${(exam).toUpperCase()} Mock — Solutions`;

  // Fetch questions from Firestore
  try {
    // We use dynamic import to work with module system
    const firebase = await import('./firebase.js');
    const { db, collection, getDocs, query, where, orderBy } = firebase;

    let q;
    if (testId) {
      q = query(collection(db, 'mockQuestions'), where('testId','==', testId));
    } else if (exam === 'jee') {
      q = query(collection(db, 'mockQuestions'), where('exam','==','jee'));
    } else {
      const year  = result.year  || localStorage.getItem('selectedYear')  || '';
      const shift = result.shift || localStorage.getItem('selectedShift') || '';
      q = query(collection(db, 'mockQuestions'), where('exam','==','cuet'), where('year','==', parseInt(year)||year), where('shift','==', shift));
    }

    const snap = await getDocs(q);
    const allQ = [];
    snap.forEach(d => allQ.push({ id: d.id, ...d.data() }));
    SOL_STATE.allQuestions = allQ;
  } catch(err) {
    console.warn('Firestore fetch error:', err);
    // Fallback: reconstruct from answers only (no question text)
  }

  buildFlatList(result);
  renderCurrentQuestion();

  // Show AI button now that we have data
  const aiBtn = document.getElementById('solAiBtn');
  if (aiBtn) aiBtn.style.display = 'flex';
})();

function buildFlatList(result) {
  const answers  = SOL_STATE.answers;
  const allQ     = SOL_STATE.allQuestions;

  // Group questions by subject same way mock.html does
  let subjects = result.subjects || [];
  if (!subjects.length) {
    try { subjects = JSON.parse(localStorage.getItem('selectedSubjects') || '[]'); } catch(e){}
  }
  if (!subjects.length) subjects = Object.keys(answers);

  function normSubject(s) { return (s||'').trim().toLowerCase(); }

  subjects.forEach(sub => {
    const subAnswers = answers[sub] || {};
    const subQs = allQ
      .filter(q => normSubject(q.subject) === normSubject(sub))
      .sort((a,b) => (a.questionNo||0) - (b.questionNo||0));

    const ansKeys = Object.keys(subAnswers).map(Number).sort((a,b)=>a-b);

    // If we have Firestore questions, use them; otherwise generate stubs
    const questionsToUse = subQs.length > 0
      ? subQs
      : ansKeys.map(i => ({ subject: sub, questionNo: i+1, question: `Question ${i+1}`, options: [], correctAnswer: '' }));

    questionsToUse.forEach((q, i) => {
      const ansObj = subAnswers[i] || { answer: null };
      SOL_STATE.flatList.push({ subject: sub, q, ansObj, globalIdx: SOL_STATE.flatList.length });
    });
  });

  // Update counter
  updateCounter();
}

function updateCounter() {
  const el = document.getElementById('hdrCounter');
  if (el) el.textContent = `Q ${SOL_STATE.currentIdx + 1} / ${SOL_STATE.flatList.length}`;
}

function renderCurrentQuestion() {
  const content = document.getElementById('questionContent');
  const flat    = SOL_STATE.flatList;
  const total   = flat.length;

  if (!total) {
    content.innerHTML = `<div class="no-data"><div class="no-data-icon"><i class="fa-regular fa-circle-question"></i></div><div class="no-data-title">No Questions Found</div><div class="no-data-sub">Questions could not be loaded. Try completing the test again.</div></div>`;
    return;
  }

  const item    = flat[SOL_STATE.currentIdx];
  const { subject, q, ansObj } = item;
  const letters = ['A','B','C','D','E'];

  const userAnswer    = ansObj?.answer !== undefined ? ansObj.answer : null;
  const correctAnswer = (q.correctAnswer || '').toString().toUpperCase();
  const isInteger     = (q.type || 'mcq') === 'integer';

  const isCorrect  = userAnswer !== null && String(userAnswer).toUpperCase() === correctAnswer;
  const isSkipped  = userAnswer === null || userAnswer === '';

  // Build options HTML
  let optionsHTML = '';
  if (isInteger) {
    const ua = userAnswer !== null ? String(userAnswer) : '—';
    const correct = (q.correctAnswer || '').toString();
    optionsHTML = `
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:4px;">
        <div style="padding:12px 15px;border-radius:12px;background:rgba(16,185,129,0.1);border:1.5px solid #10B981;">
          <div style="font-size:11px;color:#10B981;font-weight:700;margin-bottom:4px;"><i class="fa-solid fa-check" style="margin-right:5px;"></i>Correct Answer</div>
          <div style="font-size:18px;font-weight:700;color:var(--text-primary);">${escHtml(correct)}</div>
        </div>
        <div style="padding:12px 15px;border-radius:12px;background:${isCorrect?'rgba(16,185,129,0.08)':isSkipped?'rgba(156,163,175,0.08)':'rgba(239,68,68,0.08)'};border:1.5px solid ${isCorrect?'#10B981':isSkipped?'var(--card-border)':'#EF4444'};">
          <div style="font-size:11px;color:${isCorrect?'#10B981':isSkipped?'var(--text-secondary)':'#EF4444'};font-weight:700;margin-bottom:4px;">
            <i class="fa-solid ${isCorrect?'fa-check':isSkipped?'fa-minus':'fa-xmark'}" style="margin-right:5px;"></i>Your Answer
          </div>
          <div style="font-size:18px;font-weight:700;color:var(--text-primary);">${escHtml(ua)}</div>
        </div>
      </div>`;
  } else {
    const opts = q.options || [];
    optionsHTML = `<div class="options-list">` +
      opts.map((opt, oi) => {
        const letter = letters[oi];
        const isThisCorrect = letter.toUpperCase() === correctAnswer;
        const isChosen      = String(userAnswer).toUpperCase() === letter.toUpperCase();
        const isChosenWrong = isChosen && !isThisCorrect;

        let cls = '';
        if (isThisCorrect) cls = 'correct';
        else if (isChosenWrong) cls = 'chosen-wrong';

        let resultBadge = '';
        if (isThisCorrect && isChosen) resultBadge = `<div class="opt-result-badge badge-correct"><i class="fa-solid fa-check"></i> Correct — You chose this</div>`;
        else if (isThisCorrect && !isChosen) resultBadge = `<div class="opt-result-badge badge-correct"><i class="fa-solid fa-check"></i> Correct Answer</div>`;
        else if (isChosenWrong) resultBadge = `<div class="opt-result-badge badge-wrong"><i class="fa-solid fa-xmark"></i> Wrong — You chose this</div>`;

        return `
          <div class="option-item ${cls}">
            <div class="opt-letter">${letter}</div>
            <div style="flex:1;min-width:0;overflow:hidden;">
              <div class="opt-text math-render">${prepareMathHtml(opt)}</div>
              ${resultBadge}
            </div>
          </div>`;
      }).join('') +
      `</div>`;
  }

  // Result box
  let resultBox = '';
  if (isSkipped) {
    resultBox = `<div class="q-result-box skipped"><i class="fa-solid fa-minus"></i> Skipped — No answer selected</div>`;
  } else if (isCorrect) {
    resultBox = `<div class="q-result-box correct"><i class="fa-solid fa-check-circle"></i> Correct</div>`;
  } else {
    resultBox = `<div class="q-result-box wrong"><i class="fa-solid fa-times-circle"></i> Incorrect</div>`;
  }

  const qIdx = SOL_STATE.currentIdx;
  content.innerHTML = `
    <div class="question-card">
      <div class="q-header">
        <span class="q-num">Q.${qIdx + 1} of ${total}</span>
        <span class="q-subj-badge">${escHtml(subject)}</span>
        <span class="q-subj-badge" style="background:rgba(139,92,246,0.08);border-color:rgba(139,92,246,0.2);color:#8B5CF6;">${isInteger ? 'Integer' : 'MCQ'}</span>
      </div>
      <div class="q-text math-render">${formatQuestionText(q.question || 'Question text not available.')}</div>
      ${optionsHTML}
      ${resultBox}
      <button class="ai-answer-btn" id="aiAnswerBtn_${qIdx}" onclick="toggleAIAnswer(${qIdx})">
        <span style="font-size:14px;">🤖</span> AI Detailed Answer
      </button>
      <div id="aiAnswerBox_${qIdx}" style="display:none;"></div>
    </div>`;

  // Trigger MathJax on newly inserted content
  triggerMathJax(content);

  // Scroll to top
  document.getElementById('questionPanel').scrollTo({ top:0, behavior:'smooth' });

  // Update next button
  const nextBtn = document.getElementById('nextBtn');
  if (nextBtn) {
    const isLast = SOL_STATE.currentIdx >= total - 1;
    nextBtn.innerHTML = isLast
      ? `<i class="fa-solid fa-flag-checkered"></i> Finish`
      : `Next <i class="fa-solid fa-arrow-right"></i>`;
    nextBtn.onclick = isLast ? () => goBack() : () => nextQuestion();
  }

  // Update prev button
  const prevBtn = document.getElementById('prevBtn');
  if (prevBtn) {
    prevBtn.disabled = SOL_STATE.currentIdx <= 0;
  }

  updateCounter();
}

window.nextQuestion = function() {
  const flat = SOL_STATE.flatList;
  if (SOL_STATE.currentIdx < flat.length - 1) {
    SOL_STATE.currentIdx++;
    renderCurrentQuestion();
  }
};

window.prevQuestion = function() {
  if (SOL_STATE.currentIdx > 0) {
    SOL_STATE.currentIdx--;
    renderCurrentQuestion();
  }
};

/* ── Launch AI Analysis from Solutions (rich question-level data) ── */
window.launchAIFromSolutions = function() {
  const btn = document.getElementById('solAiBtn');
  if (btn) { btn.disabled = true; btn.style.opacity = '0.7'; }

  // Base result data — prefer cached solutionsData (current test), not lastTestResult (may be newer)
  let baseResult = null;
  try { baseResult = JSON.parse(sessionStorage.getItem('_solResult') || 'null'); } catch(e) {}
  if (!baseResult) {
    try { baseResult = JSON.parse(localStorage.getItem('lastTestResult') || 'null'); } catch(e) {}
  }

  // Build rich questions array from SOL_STATE.flatList
  // Each item: { subject, topic, correct: bool }
  const questions = SOL_STATE.flatList.map(item => {
    const { subject, q, ansObj } = item;
    const userAnswer    = ansObj?.answer !== undefined ? ansObj.answer : null;
    const correctAnswer = (q.correctAnswer || '').toString().toUpperCase();
    const isCorrect     = userAnswer !== null && userAnswer !== ''
                          && String(userAnswer).toUpperCase() === correctAnswer;
    return {
      subject: subject || q.subject || 'Unknown',
      topic:   q.topic || q.chapter || q.section || subject || 'Unknown',
      correct: isCorrect,
    };
  });

  // Build subjects summary from flatList
  const subjectsMap = {};
  SOL_STATE.flatList.forEach(item => {
    const sub = (item.subject || 'Unknown').toLowerCase().replace(/\s+/g,'_');
    if (!subjectsMap[sub]) subjectsMap[sub] = { correct: 0, wrong: 0 };
    const userAnswer    = item.ansObj?.answer !== undefined ? item.ansObj.answer : null;
    const correctAnswer = (item.q.correctAnswer || '').toString().toUpperCase();
    const isCorrect     = userAnswer !== null && userAnswer !== ''
                          && String(userAnswer).toUpperCase() === correctAnswer;
    const isSkipped     = userAnswer === null || userAnswer === '';
    if (!isSkipped) {
      if (isCorrect) subjectsMap[sub].correct++;
      else           subjectsMap[sub].wrong++;
    }
  });

  // Merge with base result
  const total       = baseResult?.total     || SOL_STATE.flatList.length;
  const _examS      = (baseResult?.exam || '').toLowerCase();
  const _markingS   = baseResult?.marking || localStorage.getItem('selectedMarking') || (_examS === 'jee' ? '+4/-1' : '+5/-1');
  const _posMarkS   = parseInt(_markingS.split('/')[0]) || (_examS === 'jee' ? 4 : 5);
  const maxScore    = total * _posMarkS;
  const correct     = baseResult?.correct   || Object.values(subjectsMap).reduce((s,v)=>s+v.correct,0);
  const incorrect   = baseResult?.incorrect || Object.values(subjectsMap).reduce((s,v)=>s+v.wrong,0);
  const attempted   = correct + incorrect;
  const accuracy    = attempted > 0 ? Math.round((correct / attempted) * 100) : (baseResult?.accuracy || 0);

  const payload = {
    score:      baseResult?.score      || 0,
    total,
    maxScore,
    correct,
    incorrect,
    accuracy:   baseResult?.accuracy   ?? accuracy,
    percentile: baseResult?.percentile || 0,
    rank:       baseResult?.rank       || '—',
    timeTaken:  baseResult?.timeTaken  || 0,
    exam:       baseResult?.exam       || '',
    year:       baseResult?.year       || '',
    subjects:   Object.keys(subjectsMap).length > 0 ? subjectsMap : (baseResult?.subjects || {}),
    questions,  // ← rich question-level data from Firestore
  };

  try {
    localStorage.setItem('analysisData', JSON.stringify(payload));
  } catch(e) {
    if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
    alert('Storage error. Please try again.');
    return;
  }

  navigate('ai-analysis.html');
};

/* ============================================================
   AI DETAILED ANSWER — per question, via Cloudflare Worker
============================================================ */
const AI_WORKER_URL = 'https://ai-analysis.untitledworld9.workers.dev';
const _aiAnswerCache = {};
const _aiAnswerOpened = new Set();

window.toggleAIAnswer = async function(qIdx) {
  const box = document.getElementById('aiAnswerBox_' + qIdx);
  const btn = document.getElementById('aiAnswerBtn_' + qIdx);
  if (!box || !btn) return;

  if (box.style.display !== 'none' && box.innerHTML !== '') {
    box.style.display = 'none';
    btn.innerHTML = '<span style="font-size:14px;">🤖</span> AI Detailed Answer';
    return;
  }

  _aiAnswerOpened.add(qIdx);
  hideScrollHint();
  box.style.display = 'block';
  btn.innerHTML = '<span style="font-size:14px;">🤖</span> Hide AI Answer';

  if (_aiAnswerCache[qIdx]) {
    renderAIAnswer(box, _aiAnswerCache[qIdx]);
    setTimeout(() => btn.scrollIntoView({ behavior:'smooth', block:'nearest' }), 100);
    return;
  }

  box.innerHTML = '<div class="ai-answer-box"><div class="ai-answer-loading"><div class="ai-spinner"></div> Generating answer...</div></div>';
  setTimeout(() => btn.scrollIntoView({ behavior:'smooth', block:'nearest' }), 100);
  btn.classList.add('loading');

  const flat = SOL_STATE.flatList;
  const item = flat[qIdx];
  if (!item) { box.innerHTML = ''; btn.classList.remove('loading'); return; }

  const { subject, q } = item;
  const letters = ['A','B','C','D','E'];
  const correctAnswer = (q.correctAnswer || '').toString().toUpperCase();
  const isInteger = (q.type || 'mcq') === 'integer';

  let optionsText = '';
  if (isInteger) {
    optionsText = 'Answer Type: Integer\nCorrect Answer: ' + q.correctAnswer;
  } else {
    const opts = q.options || [];
    optionsText = opts.map((opt, i) => {
      const letter = letters[i];
      const mark = letter.toUpperCase() === correctAnswer ? ' (Correct)' : '';
      return letter + ') ' + opt + mark;
    }).join('\n');
  }

  const exam = localStorage.getItem('selectedExam') || 'Competitive Exam';

  const prompt = 'You are an expert ' + exam + ' tutor. Explain the solution to this question clearly and concisely.\n\nQuestion: ' + (q.question || '') + '\nSubject: ' + (subject || '') + (q.topic ? '\nTopic: ' + q.topic : '') + '\n\nOptions:\n' + optionsText + '\n\nCorrect Answer: ' + correctAnswer + '\n\nGive a clear, structured explanation in simple English. Cover:\n1. The key concept being tested\n2. Step-by-step solution logic\n3. Why the correct answer is right (and briefly why others are wrong if MCQ)\n4. Any formula or trick to remember\n\nRules:\n- Use simple, understandable English (not too technical, not too basic)\n- Be concise but complete — 100 to 180 words max\n- Use **bold** for key terms or formulas\n- Do NOT add any intro line like "Here is the answer" — go straight to the explanation\n- Structure it clearly with line breaks';

  try {
    const resp = await fetch(AI_WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.5, maxOutputTokens: 600 }
      })
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
    if (!text) throw new Error('Empty response');
    _aiAnswerCache[qIdx] = text;
    renderAIAnswer(box, text);
  } catch(err) {
    box.innerHTML = '<div class="ai-answer-box"><div class="ai-answer-content" style="color:var(--accent);font-size:12px;">⚠️ Could not load answer. Please check your connection and try again.</div></div>';
    btn.innerHTML = '<span style="font-size:14px;">🤖</span> AI Detailed Answer';
  }
  btn.classList.remove('loading');
};

function renderAIAnswer(box, text) {
  const formatted = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>');
  box.innerHTML = '<div class="ai-answer-box"><div class="ai-answer-header"><div class="ai-dot"></div> AI Explanation</div><div class="ai-answer-content">' + formatted + '</div></div>';
}

/* ── SCROLL HINT after 10 min ── */
let _hintTimer = null;
let _hintDismissed = false;

function startScrollHintTimer() {
  if (sessionStorage.getItem('_aiHintDismissed')) return;
  _hintTimer = setTimeout(function() {
    if (_aiAnswerOpened.size === 0 && !_hintDismissed) {
      const hint = document.getElementById('aiScrollHint');
      if (hint) hint.style.display = 'flex';
    }
  }, 10 * 60 * 1000);
}

function hideScrollHint() {
  _hintDismissed = true;
  sessionStorage.setItem('_aiHintDismissed', '1');
  const hint = document.getElementById('aiScrollHint');
  if (hint) hint.style.display = 'none';
  if (_hintTimer) clearTimeout(_hintTimer);
}

window.dismissHintAndScroll = function() {
  hideScrollHint();
  const btn = document.getElementById('aiAnswerBtn_' + SOL_STATE.currentIdx);
  if (btn) btn.scrollIntoView({ behavior:'smooth', block:'center' });
};

startScrollHintTimer();

/* Theme sync */
(function() {
  const meta = document.querySelector('meta[name="theme-color"]');
  if (!meta) return;
  function sync() { meta.content = document.documentElement.getAttribute('data-theme') === 'dark' ? '#0B1220' : '#ffffff'; }
  sync();
  new MutationObserver(sync).observe(document.documentElement, { attributes:true, attributeFilter:['data-theme'] });
})();
</script>
