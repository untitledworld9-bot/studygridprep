<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Focus Mode | Untitled World</title>
<link rel="icon" href="icon.png">
<meta name="theme-color" content="#0f1c18">

<!-- Open Graph -->
<meta property="og:title" content="Untitled World Focus Timer">
<meta property="og:description" content="Study together online — Focus timer with friends, leaderboard & rooms.">
<meta property="og:image" content="https://untitledworld.us.cc/icon.png">
<meta property="og:url" content="https://untitledworld.us.cc/timer">
<meta property="og:type" content="website">
<meta name="description" content="Online focus timer with friends, leaderboard and private study rooms.">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* ── Reset ──────────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --neon-green:#00ff88;
  --neon-blue:#00f2fe;
  --bg-dark:#0f1c18;
}

/* ── Body — Aurora background ───────────────────────────────────────────── */
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Outfit',sans-serif;color:#fff;
  background:#0a1a12;
  position:relative;
}

/* Aurora layers */
body::before{
  content:"";position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%,rgba(0,80,40,.55),transparent),
    radial-gradient(ellipse 60% 80% at 20% 70%,rgba(0,180,100,.18),transparent),
    radial-gradient(ellipse 50% 60% at 80% 50%,rgba(0,100,160,.12),transparent),
    linear-gradient(180deg,#071410 0%,#0a1a12 40%,#080e0a 100%);
  pointer-events:none;
}
/* Animated aurora shimmer */
body::after{
  content:"";position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 100% 40% at 50% 15%,rgba(0,200,100,.12),transparent),
    radial-gradient(ellipse 70% 30% at 30% 60%,rgba(0,160,255,.06),transparent);
  animation:aurora 12s ease-in-out infinite alternate;
  pointer-events:none;
}
@keyframes aurora{
  0%{opacity:.6;transform:scaleX(1);}
  50%{opacity:1;transform:scaleX(1.05);}
  100%{opacity:.7;transform:scaleX(.97);}
}

/* ── Page structure ─────────────────────────────────────────────────────── */
.page{
  position:relative;z-index:1;
  height:100vh;display:flex;flex-direction:column;
  overflow:hidden;
}

/* ── Header ─────────────────────────────────────────────────────────────── */
header{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 20px;flex-shrink:0;
}
.brand{font-size:18px;font-weight:700;color:rgba(255,255,255,.9);}
.menu-btn{font-size:24px;cursor:pointer;padding:4px 8px;border-radius:8px;transition:.2s;}
.menu-btn:hover{background:rgba(255,255,255,.08);}

/* ── Status card (leaderboard link) ─────────────────────────────────────── */
#statusCard{
  display:flex;align-items:center;gap:12px;
  margin:0 20px 8px;
  padding:12px 16px;
  border-radius:16px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(0,242,254,0.15);
  cursor:pointer;transition:.2s;flex-shrink:0;
}
#statusCard:hover{background:rgba(0,242,254,0.08);border-color:rgba(0,242,254,.35);}
.status-left{font-size:20px;}
.status-title{font-weight:600;font-size:14px;}
.status-sub{font-size:11px;opacity:.55;margin-top:1px;}

/* ── Dropdown nav ───────────────────────────────────────────────────────── */
.dropdown{
  position:absolute;top:60px;right:20px;
  background:rgba(15,28,24,.95);
  border:1px solid rgba(0,242,254,.2);
  border-radius:12px;display:none;flex-direction:column;
  width:160px;z-index:50;overflow:hidden;
}
.dropdown.active{display:flex;}
.dropdown a{
  padding:14px 16px;color:rgba(255,255,255,.8);
  text-decoration:none;border-bottom:1px solid rgba(255,255,255,.06);
  font-size:14px;transition:.15s;
}
.dropdown a:last-child{border-bottom:none;}
.dropdown a:hover{background:rgba(0,242,254,.08);color:#fff;}

/* ── Timer wrapper ──────────────────────────────────────────────────────── */
.timer-wrapper{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;padding-bottom:20px;
}

/* ── Timer Ring ─────────────────────────────────────────────────────────── */
.timer-ring{
  width:240px;height:240px;border-radius:50%;
  border:4px solid rgba(255,255,255,0.1);
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin-bottom:24px;position:relative;
  transition:.4s ease;
}
.timer-ring.active{
  border-color:var(--neon-green);
  box-shadow:
    0 0 0 1px rgba(0,255,136,.2),
    0 0 20px rgba(0,255,136,.35),
    0 0 50px rgba(0,255,136,.15),
    inset 0 0 40px rgba(0,255,136,.05);
}

/* Mode label inside ring */
.mode-label{
  font-size:12px;color:rgba(255,255,255,.5);
  text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:4px;
}

/* Time display */
.time-display{
  font-size:52px;font-weight:800;letter-spacing:-.02em;
  font-variant-numeric:tabular-nums;
}

/* Mode selector row */
.mode-row{
  display:flex;gap:8px;margin-bottom:16px;
}
.preset-btn{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.7);padding:8px 16px;border-radius:10px;
  font-size:13px;font-weight:600;cursor:pointer;transition:.2s;
  font-family:'Outfit',sans-serif;
}
.preset-btn.active,.preset-btn:hover{
  background:rgba(0,242,254,.15);border-color:var(--neon-blue);color:#fff;
}

/* ── Action buttons ─────────────────────────────────────────────────────── */
.action-btn{
  width:200px;padding:15px;border-radius:50px;
  font-size:16px;font-weight:700;border:none;cursor:pointer;
  font-family:'Outfit',sans-serif;transition:.2s;
}
.action-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.4);}
.start{background:var(--neon-green);color:#000;}
.stop{background:#ff4757;color:#fff;}

/* ── Leaderboard button (right side) ───────────────────────────────────── */
#leaderboardBtn{
  position:fixed;right:16px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:rgba(0,0,0,0.4);
  border:1px solid rgba(0,242,254,0.25);
  border-radius:14px;padding:12px 8px;
  cursor:pointer;z-index:10;transition:.2s;
  backdrop-filter:blur(10px);
  text-decoration:none;color:#fff;
}
#leaderboardBtn:hover{
  background:rgba(0,242,254,0.1);
  border-color:var(--neon-blue);
  transform:translateY(-50%) scale(1.05);
}
#leaderboardBtn .lb-icon{font-size:22px;}
#leaderboardBtn .lb-label{font-size:9px;opacity:.7;writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);}

/* ── Room controls ──────────────────────────────────────────────────────── */
.room-controls{
  position:fixed;top:80px;right:16px;
  display:flex;flex-direction:column;gap:8px;z-index:9;
}
.room-controls button{
  width:36px;height:36px;border-radius:50%;border:none;
  background:rgba(0,242,254,0.1);color:var(--neon-blue);
  font-size:14px;cursor:pointer;
  backdrop-filter:blur(10px);
  box-shadow:0 0 8px rgba(0,242,254,.2);
  transition:.2s;font-family:'Outfit',sans-serif;
}
.room-controls button:hover{
  background:var(--neon-blue);color:#000;transform:scale(1.1);
}

/* ── Group FAB ──────────────────────────────────────────────────────────── */
.group-fab{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  width:90%;max-width:360px;
  background:rgba(15,28,24,.85);
  border:1px solid rgba(0,242,254,.25);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  padding:14px 18px;border-radius:18px;
  display:flex;justify-content:center;align-items:center;
  box-shadow:0 8px 30px rgba(0,0,0,.5);cursor:pointer;z-index:10;
  transition:.2s;
}
.group-fab:hover{border-color:var(--neon-blue);background:rgba(0,242,254,.07);}
.fab-title{font-weight:700;color:#fff;margin-right:8px;font-size:14px;}
.fab-sub{font-size:11px;color:var(--neon-blue);}

/* ── Backdrop & Social Sheet ─────────────────────────────────────────────── */
.backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  backdrop-filter:blur(4px);z-index:15;display:none;
}
.social-sheet{
  position:fixed;bottom:-100%;left:0;width:100%;height:70vh;
  background:rgba(12,22,18,.97);
  border-top:1px solid rgba(0,242,254,.2);
  border-top-left-radius:24px;border-top-right-radius:24px;
  z-index:20;transition:.35s cubic-bezier(.25,.46,.45,.94);
  padding:20px;display:flex;flex-direction:column;
}
.social-sheet.open{bottom:0;}
.sheet-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.sheet-header h3{font-size:16px;font-weight:700;}
.invite-btn{
  background:rgba(37,211,102,.15);border:1px solid rgba(37,211,102,.3);
  color:#25d366;padding:7px 14px;border-radius:10px;
  font-size:13px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;
  transition:.2s;
}
.invite-btn:hover{background:#25d366;color:#000;}

.user-list-container{flex:1;overflow-y:auto;}
.member-card{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.04);
  padding:12px;border-radius:12px;margin-bottom:8px;
  border:1px solid rgba(0,255,136,.2);
}
.status-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px;}
.online{background:var(--neon-green);box-shadow:0 0 6px var(--neon-green);}
.offline{background:#555;}
.member-card button{
  margin-left:auto;background:transparent;border:none;
  font-size:18px;cursor:pointer;transition:.2s;
}
.member-card button:hover{transform:scale(1.2);}

.close-sheet-btn{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.6);padding:10px;border-radius:12px;
  cursor:pointer;font-size:13px;margin-top:12px;
  font-family:'Outfit',sans-serif;transition:.2s;
}

/* ── Leaderboard in sheet ───────────────────────────────────────────────── */
#leaderboard{
  margin-top:12px;padding:12px;
  background:rgba(255,255,255,.04);
  border-radius:14px;border:1px solid rgba(0,242,254,.15);
}
#leaderboard div{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 10px;margin-bottom:5px;
  border-radius:9px;background:rgba(255,255,255,.03);
  font-size:13px;transition:.2s;
  border:1px solid rgba(255,255,255,.06);
}
#leaderboard div:hover{background:rgba(0,242,254,.08);}
#leaderboard div:nth-child(1){color:gold;font-weight:700;animation:glow 2s infinite;}
#leaderboard div:nth-child(2){color:silver;}
#leaderboard div:nth-child(3){color:#cd7f32;}
@keyframes glow{
  0%,100%{box-shadow:0 0 8px rgba(0,255,136,.2);}
  50%{box-shadow:0 0 18px rgba(0,255,136,.4);}
}

/* ── Room Modals ────────────────────────────────────────────────────────── */
.room-modal{
  position:fixed;inset:0;display:none;
  justify-content:center;align-items:center;
  background:rgba(0,0,0,.6);backdrop-filter:blur(12px);z-index:200;
}
.room-card{
  background:rgba(12,22,18,.95);
  border:1px solid rgba(0,242,254,.25);
  border-radius:20px;padding:24px 20px;
  width:90%;max-width:300px;text-align:center;
  animation:modalPop .25s ease;
}
.room-card h3{margin-bottom:12px;color:var(--neon-blue);font-size:17px;}
.room-card input{
  width:100%;padding:11px 14px;margin:10px 0 14px;
  border-radius:10px;border:1px solid rgba(0,242,254,.2);
  background:rgba(255,255,255,.05);color:#fff;
  font-size:14px;font-family:'Outfit',sans-serif;outline:none;
}
.room-card input:focus{border-color:var(--neon-blue);}
.room-card button{
  background:var(--neon-green);border:none;padding:10px 20px;
  border-radius:20px;font-weight:700;cursor:pointer;
  font-family:'Outfit',sans-serif;transition:.2s;
}
.room-card button:hover{transform:scale(1.04);}
.room-card .closeModal{
  display:block;margin-top:10px;cursor:pointer;
  color:rgba(255,255,255,.4);font-size:13px;
}
@keyframes modalPop{
  from{transform:scale(.85);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

/* ── Chat ───────────────────────────────────────────────────────────────── */
#chatBox{
  position:fixed;bottom:0;left:0;width:100%;
  background:rgba(12,22,18,.97);
  border-top:2px solid var(--neon-blue);
  display:none;padding:10px;z-index:9999;
}
#chatMessages{
  height:180px;overflow:auto;margin-bottom:8px;padding:8px;
  background:rgba(0,0,0,.2);border-radius:10px;
}
#chatMessages div{
  max-width:75%;padding:8px 12px;margin:4px;
  border-radius:14px;font-size:13px;
}
.msg-me{
  background:rgba(0,242,254,.2);color:#fff;
  margin-left:auto;border-radius:14px 14px 0 14px;
}
.msg-other{background:rgba(255,255,255,.08);}
#chatBox button{
  padding:10px 16px;font-size:14px;border-radius:18px;
  background:var(--neon-green);color:#000;font-weight:700;
  border:none;cursor:pointer;font-family:'Outfit',sans-serif;
}
.chat-input-row{display:flex;align-items:center;gap:8px;}
#chatInput{
  flex:1;padding:11px 14px;border-radius:12px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.06);color:#fff;
  font-family:'Outfit',sans-serif;font-size:13px;outline:none;
}

/* ── Notifications ──────────────────────────────────────────────────────── */
#chatNotify{
  position:fixed;bottom:90px;left:15px;
  background:var(--neon-green);color:#000;
  padding:7px 14px;border-radius:20px;display:none;
  font-size:13px;font-weight:700;
  box-shadow:0 0 12px rgba(0,255,136,.5);z-index:99999;pointer-events:none;
}
.wave-popup{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:rgba(0,255,136,.12);border:1px solid var(--neon-green);
  padding:11px 18px;border-radius:28px;backdrop-filter:blur(10px);
  font-weight:600;color:var(--neon-green);z-index:99999;
  animation:waveFade 3s ease forwards;
}
@keyframes waveFade{
  0%{opacity:0;transform:translate(-50%,16px);}
  20%{opacity:1;transform:translate(-50%,0);}
  80%{opacity:1;}
  100%{opacity:0;}
}

.admin-msg{
  position:fixed;top:90px;left:50%;transform:translateX(-50%);
  background:rgba(0,242,254,.15);border:1px solid var(--neon-blue);
  color:#fff;padding:10px 20px;border-radius:22px;
  font-weight:600;z-index:9999;font-size:13px;
}

/* ── Smooth page transition ─────────────────────────────────────────────── */
body{animation:pageIn .35s ease forwards;}
@keyframes pageIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>
<body>

<!-- Auth check: redirect to login if not logged in -->
<script>
if (!localStorage.getItem("userName")) {
  window.location.replace("login.html");
}
</script>

<div class="page">

  <header>
    <div class="brand">Focus Mode 📚</div>
    <div class="menu-btn" id="menuToggle">☰</div>
  </header>

  <!-- Leaderboard quick-link (right side) -->
  <a href="leaderboard.html" id="leaderboardBtn" title="Weekly Leaderboard">
    <span class="lb-icon">🏆</span>
    <span class="lb-label">Leaderboard</span>
  </a>

  <!-- Status card (same id — script.js wires click → leaderboard.html) -->
  <div id="statusCard">
    <div class="status-left">📈</div>
    <div class="status-right">
      <div class="status-title">Leaderboard</div>
      <div class="status-sub">Know your weekly rank &amp; ⭐ XP</div>
    </div>
  </div>

  <!-- Dropdown nav (same id — script.js wires toggle) -->
  <div class="dropdown" id="navMenu">
    <a href="mailto:support@untitledworld.us.cc">Contact Us</a>
    <a onclick="logoutUser()">Logout</a>
  </div>

  <!-- Timer area -->
  <div class="timer-wrapper">

    <!-- Mode presets -->
    <div class="mode-row">
      <button class="preset-btn active" onclick="setMode('stopwatch',this)">Stopwatch</button>
      <button class="preset-btn" onclick="setMode('25',this)">25 min</button>
      <button class="preset-btn" onclick="setMode('50',this)">50 min</button>
      <button class="preset-btn" onclick="setMode('custom',this)">Custom</button>
    </div>

    <!-- Ring -->
    <div class="timer-ring" id="ring">
      <div class="mode-label" id="modeLabel">Stopwatch Mode</div>
      <div class="time-display" id="display">00:00</div>
    </div>

    <!-- Controls -->
    <button class="action-btn start" id="startBtn">Start Focus</button>
    <button class="action-btn stop"  id="stopBtn" style="display:none;">Stop Session</button>

  </div>

  <!-- Room controls -->
  <div class="room-controls">
    <button type="button" id="createRoomBtn" title="Create Room">＋</button>
    <button type="button" id="joinRoomBtn"   title="Join Room">→</button>
  </div>

  <!-- Create Room Modal -->
  <div id="createModal" class="room-modal">
    <div class="room-card">
      <h3>Create Study Room</h3>
      <input id="roomName" placeholder="Room Name">
      <button id="confirmCreate">Enter Room 🚀</button>
      <span class="closeModal">Cancel</span>
    </div>
  </div>

  <!-- Join Room Modal -->
  <div id="joinModal" class="room-modal">
    <div class="room-card">
      <h3>Join Room</h3>
      <input id="joinRoomInput" placeholder="Enter Room ID">
      <button id="confirmJoin">Join 🚀</button>
      <span class="closeModal">Cancel</span>
    </div>
  </div>

  <!-- Group FAB -->
  <div class="group-fab" id="openPanelBtn">
    <div class="fab-content">
      <span class="fab-title">👥 Group Study Room</span>
      <span class="fab-sub">Tap for friends, chats &amp; leaderboard</span>
    </div>
  </div>

  <!-- Backdrop -->
  <div class="backdrop" id="backdrop"></div>

  <!-- Social sheet (same ids — script.js wires it) -->
  <div class="social-sheet" id="socialSheet">
    <div class="sheet-header">
      <h3>Live Members</h3>
      <div style="display:flex;gap:8px;">
        <button id="inviteWhatsapp" class="invite-btn">
          <i class="fa-brands fa-whatsapp"></i> WhatsApp
        </button>
        <button id="copyInvite" class="invite-btn">📋 Copy</button>
      </div>
    </div>

    <div id="userList" class="user-list-container"></div>
    <div id="leaderboard" style="margin-top:12px;"></div>
    <button class="close-sheet-btn" id="closePanelBtn">⬇️ Close Panel</button>
  </div>

</div><!-- .page -->

<!-- Chat box (same ids) -->
<div id="chatBox">
  <div id="chatMessages"></div>
  <div class="chat-input-row">
    <input id="chatInput" placeholder="Type message…">
    <button onclick="sendMsg()">Send</button>
    <button onclick="closeChat()">✕</button>
  </div>
</div>

<!-- Chat notification -->
<div id="chatNotify">
  💬 <span id="notifyText"></span>
</div>

<!-- Wave popup -->
<div id="wavePopup" class="wave-popup" style="display:none;"></div>

<!-- Preset buttons hook (sets countdown mode for script.js) -->
<script>
function setMode(m, btn) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // mode is handled by script.js preset logic — we mirror the label
  const modeLabel = document.getElementById('modeLabel');
  if (!modeLabel) return;
  if (m === 'stopwatch') modeLabel.textContent = 'Stopwatch Mode';
  else if (m === 'custom') {
    const mins = prompt('Enter minutes:');
    if (mins && !isNaN(mins)) modeLabel.textContent = mins + ' min Countdown';
  } else {
    modeLabel.textContent = m + ' min Countdown';
  }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
<script type="module" src="script.js"></script>

</body>
</html>
