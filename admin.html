<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Untitled World Admin</title><style>

*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif;}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
display:flex;
}

/* Sidebar */

.sidebar{
width:230px;
background:rgba(0,0,0,.35);
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.sidebar h2{
margin-bottom:15px;
}

.sidebar button{
background:none;
border:none;
color:white;
text-align:left;
padding:10px;
border-radius:6px;
cursor:pointer;
}

.sidebar button:hover{
background:rgba(255,255,255,.1);
}

/* Main */

.main{
flex:1;
padding:25px;
overflow:auto;
}

.section{
display:none;
}

.section.active{
display:block;
}

/* Cards */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:rgba(255,255,255,.1);
padding:20px;
border-radius:15px;
text-align:center;
backdrop-filter:blur(8px);
}

.card h3{
font-size:30px;
color:#00f2fe;
margin-top:10px;
}

/* Table */

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid rgba(255,255,255,.1);
}

/* Announcement */

textarea{
width:100%;
height:80px;
border:none;
border-radius:10px;
padding:10px;
margin-top:10px;
}

.sendBtn{
background:#00f2fe;
border:none;
padding:10px 20px;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

</style></head><body><div class="sidebar"><h2>Admin</h2><button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('users')">Users</button>
<button onclick="showSection('messages')">Chat Logs</button>
<button onclick="showSection('announcement')">Announcement</button>

<div class="admin-box">

<h3>Send Notification</h3>

<input id="notifyUser" placeholder="Username">

<input id="notifyText" placeholder="Message">

<button onclick="sendUserNotification()">Send</button>

</div>

</div><div class="main"><!-- Dashboard --><div id="dashboard" class="section active"><h2>Dashboard</h2><div class="cards"><div class="card">
Total Users
<h3 id="totalUsers">0</h3>
</div><div class="card">
Online Users
<h3 id="onlineUsers">0</h3>
</div><div class="card">
Focus Time
<h3 id="focusTime">0h</h3>
</div><div class="card">
Active Rooms
<h3 id="rooms">0</h3>
</div><div class="card">
Messages
<h3 id="messagesCount">0</h3>
</div></div></div><!-- Users --><div id="users" class="section"><h2>User Management</h2><table><thead>
<tr>
<th>Name</th>
<th>Status</th>
<th>Focus Time</th>
</tr>
</thead><tbody id="userTable"></tbody></table></div><!-- Chat Logs --><div id="messages" class="section"><h2>Chat Logs</h2><div id="chatLogs"></div></div><!-- Announcement --><div id="announcement" class="section"><h2>Send Announcement</h2><textarea id="announceText" placeholder="Write announcement"></textarea><button class="sendBtn" onclick="sendAnnouncement()">
Send
</button></div><script type="module" src="admin.js"></script></body>
</html>
