<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<!-- ✅ ZOOM BLOCK -->  
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">  
<title>Login - Study Grid Prep</title>  
<link rel="icon" href="/icon-192.png">  
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">  
  
<!-- ✅ INSTANT LOGIN CHECK — NO BLINK -->  
<script>  
(function(){  
  if(localStorage.getItem("userName")){  
    var isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;  
    if(isPWA){  
      window.location.replace("mainwelcome.html");  
    } else {  
      window.location.replace("dashboard-home.html");  
    }  
  }  
})();  
</script>  
  
<!-- ✅ THEME DETECTION -->  
<script>  
(function(){  
  var saved = localStorage.getItem("theme");  
  var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;  
  var theme = saved ? saved : (systemDark ? "dark" : "light");  
  document.documentElement.setAttribute("data-theme", theme);  
})();  
</script>  
  
<!-- ✅ FLASH PREVENTION -->  
<style>  
html{ visibility: hidden; }  
html[data-theme]{ visibility: visible; }  
</style>  
  
<style>  
/* ===== GLOBAL DESIGN SYSTEM ===== */  
  
/* LIGHT MODE (default) */  
:root{  
  --bg-start: #ffffff;  
  --bg-end: #f0f4f8;  
  --primary: #22D3EE;  
  --primary-dark: #06B6D4;  
  --secondary: #34D399;  
  --accent: #F43F5E;  
  --text-primary: #111111;  
  --text-secondary: #555555;  
  --card-bg: rgba(0,0,0,0.03);  
  --card-border: rgba(0,0,0,0.08);  
  --radius: 16px;  
  --shadow: 0 4px 20px rgba(0,0,0,0.10);  
  --transition: 0.25s ease;  
  --pill-bg: rgba(0,0,0,0.05);  
  --pill-border: rgba(0,0,0,0.08);  
  --logo-shadow: 0 4px 20px rgba(0,0,0,0.12);  
  --footer-link: #0891B2;
  --glow-primary: rgba(34,211,238,0.15);
  --modal-bg: rgba(255,255,255,0.12);
  --modal-border: rgba(255,255,255,0.25);
}  
  
/* DARK MODE */  
[data-theme="dark"]{  
  --bg-start: #0B1220;  
  --bg-end: #0F172A;  
  --text-primary: #E2E8F0;  
  --text-secondary: #94A3B8;  
  --card-bg: rgba(255,255,255,0.03);  
  --card-border: rgba(255,255,255,0.08);  
  --shadow: 0 4px 20px rgba(0,0,0,0.3);  
  --pill-bg: rgba(255,255,255,0.04);  
  --pill-border: rgba(255,255,255,0.08);  
  --logo-shadow: 0 4px 20px rgba(0,0,0,0.3);  
  --footer-link: #22D3EE;
  --glow-primary: rgba(34,211,238,0.08);
  --modal-bg: rgba(15,23,42,0.75);
  --modal-border: rgba(255,255,255,0.12);
}  
  
*{  
  margin:0; padding:0;  
  box-sizing:border-box;  
  font-family:'Poppins',sans-serif;  
}  
  
html{ background: var(--bg-start); }  
  
body{  
  background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);  
  min-height: 100vh;  
  display: flex;  
  justify-content: center;  
  align-items: center;  
  color: var(--text-primary);  
  user-select: none;  
  -webkit-user-select: none;  
  -moz-user-select: none;  
  -ms-user-select: none;  
  -webkit-tap-highlight-color: transparent;  
  overscroll-behavior-y: none;  
  animation: pageIn 0.35s ease forwards;
  position: relative;
  overflow: hidden;
}

/* ===== SUBTLE BG GLOW (ADDED) ===== */
body::before {
  content: '';
  position: fixed;
  top: -30%;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 400px;
  background: radial-gradient(ellipse, var(--glow-primary) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: glowPulse 4s ease-in-out infinite;
}

body::after {
  content: '';
  position: fixed;
  bottom: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 400px;
  height: 300px;
  background: radial-gradient(ellipse, rgba(52,211,153,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

@keyframes glowPulse {
  0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
  50% { opacity: 1; transform: translateX(-50%) scale(1.08); }
}
  
@keyframes pageIn{  
  from{ opacity:0; transform:translateY(8px); }  
  to{ opacity:1; transform:translateY(0); }  
}  
  
/* ===== LOGIN BOX ===== */  
.login-box{  
  text-align: center;  
  max-width: 360px;  
  width: 90%;  
  padding: 16px;
  position: relative;
  z-index: 1;
}  
  
.logo{  
  width: 88px;  
  height: 88px;  
  border-radius: 24px;  
  margin-bottom: 24px;  
  box-shadow: var(--logo-shadow);  
  animation: floatLogo 3.5s ease-in-out infinite;
  transition: filter 0.3s ease;
}

.logo:hover {
  filter: drop-shadow(0 0 12px var(--primary));
}
  
@keyframes floatLogo{  
  0%,100%{ transform:translateY(0px); }  
  50%{ transform:translateY(-10px); }  
}  
  
h1{  
  font-size: 24px;  
  font-weight: 700;  
  color: var(--text-primary);  
  margin-bottom: 8px;  
  min-height: 34px;  
}  
  
.sub{  
  font-size: 16px;  
  font-weight: 600;  
  color: var(--primary);  
  margin-bottom: 8px;  
  letter-spacing: 0.3px;  
}  
  
.desc{  
  font-size: 14px;  
  color: var(--text-secondary);  
  margin-bottom: 32px;  
  line-height: 1.5;  
}  
  
/* ===== CARD WRAPPER ===== */  
.login-card{  
  background: var(--card-bg);  
  border: 1px solid var(--card-border);  
  border-radius: var(--radius);  
  padding: 24px 20px;  
  box-shadow: var(--shadow);  
  margin-bottom: 20px;
  /* ADDED: glass shimmer */
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: box-shadow 0.3s ease, transform 0.3s ease;
}

.login-card:hover {
  box-shadow: 0 8px 32px rgba(34,211,238,0.12), var(--shadow);
  transform: translateY(-1px);
}
  
/* ===== GOOGLE BUTTON — NOW WHITE (REPLACED) ===== */  
.google-btn{  
  display: flex;  
  align-items: center;  
  justify-content: center;  
  gap: 12px;  
  width: 100%;  
  padding: 14px 20px;  
  /* CHANGED: white button */
  background: #ffffff;
  color: #1a1a1a;
  border: 1px solid rgba(0,0,0,0.08);  
  border-radius: 50px;  
  font-weight: 700;  
  font-size: 15px;  
  cursor: pointer;  
  transition: all 0.25s ease;
  box-shadow: 0 2px 12px rgba(0,0,0,0.10), 0 0 0 0 rgba(34,211,238,0);
  letter-spacing: 0.3px;  
  position: relative;
  overflow: hidden;
}

/* Shimmer sweep on hover */
.google-btn::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(34,211,238,0.08), transparent);
  transition: left 0.4s ease;
}
  
.google-btn img{  
  width: 20px;  
  height: 20px;  
  background: white;  
  border-radius: 50%;  
  padding: 2px;  
}  
  
.google-btn:hover{  
  transform: translateY(-2px);  
  box-shadow: 0 6px 24px rgba(0,0,0,0.12), 0 0 16px rgba(34,211,238,0.20);
  border-color: rgba(34,211,238,0.3);
}

.google-btn:hover::after {
  left: 100%;
}
  
.google-btn:active{  
  transform: scale(0.97);  
  box-shadow: 0 2px 8px rgba(0,0,0,0.10);
}  
  
/* ===== LOADING STATE ===== */  
.google-btn.loading{  
  opacity: 0.75;  
  pointer-events: none;  
  cursor: not-allowed;  
}  
  
/* ===== FEATURES PILLS ===== */  
.features-row{  
  display: flex;  
  justify-content: center;  
  flex-wrap: wrap;  
  gap: 8px;  
  margin-top: 20px;  
}  
  
.pill{  
  font-size: 12px;  
  color: var(--text-secondary);  
  background: var(--pill-bg);  
  border: 1px solid var(--pill-border);  
  border-radius: 50px;  
  padding: 5px 12px;
  /* ADDED micro-interaction */
  transition: all 0.2s ease;
  cursor: default;
}

.pill:hover {
  background: rgba(34,211,238,0.08);
  border-color: rgba(34,211,238,0.25);
  color: var(--primary);
  transform: translateY(-1px);
  box-shadow: 0 4px 10px rgba(34,211,238,0.08);
}
  
/* ===== FOOTER ===== */  
.login-footer{  
  font-size: 12px;  
  color: var(--text-secondary);  
  line-height: 1.6;  
}  
  
.login-footer a{  
  color: var(--footer-link);  
  text-decoration: none;  
}  
  
/* ===== TYPING CURSOR ===== */  
.cursor{  
  display: inline-block;  
  color: var(--primary);  
  animation: blink 0.75s step-end infinite;  
}  
@keyframes blink{ 50%{ opacity:0; } }  
  
/* ===== ERROR TOAST ===== */  
.error-toast{  
  display: none;  
  margin-top: 16px;  
  padding: 12px 16px;  
  background: rgba(244,63,94,0.12);  
  border: 1px solid rgba(244,63,94,0.3);  
  border-radius: 12px;  
  color: #F43F5E;  
  font-size: 13px;  
  text-align: center;  
}


/* ============================================
   ✅ ADDED: CLAUDE-STYLE MODAL SYSTEM
   ============================================ */

/* Blur overlay */
.sg-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.sg-overlay.active {
  opacity: 1;
  pointer-events: all;
}

/* Modal card */
.sg-modal {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.88);
  z-index: 1001;
  width: 88%;
  max-width: 320px;
  background: var(--modal-bg);
  border: 1px solid var(--modal-border);
  border-radius: 24px;
  padding: 36px 28px;
  text-align: center;
  /* glassmorphism */
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.08),
    0 8px 40px rgba(0,0,0,0.35),
    0 0 60px rgba(34,211,238,0.06);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.sg-modal.active {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  pointer-events: all;
}

/* Spinner */
.sg-spinner {
  width: 48px;
  height: 48px;
  margin: 0 auto 20px;
  position: relative;
}

.sg-spinner::before,
.sg-spinner::after {
  content: '';
  position: absolute;
  border-radius: 50%;
}

.sg-spinner::before {
  inset: 0;
  border: 3px solid rgba(34,211,238,0.12);
}

.sg-spinner::after {
  inset: 0;
  border: 3px solid transparent;
  border-top-color: #22D3EE;
  border-right-color: rgba(34,211,238,0.4);
  animation: sgSpin 0.75s linear infinite;
}

@keyframes sgSpin {
  to { transform: rotate(360deg); }
}

/* Modal logo ring */
.sg-modal-logo {
  width: 52px;
  height: 52px;
  border-radius: 16px;
  margin: 0 auto 16px;
  box-shadow: 0 0 0 1px rgba(34,211,238,0.2), 0 4px 16px rgba(0,0,0,0.2);
  display: none;
}

.sg-modal-text {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 6px;
  letter-spacing: 0.2px;
}

.sg-modal-sub {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
}

/* Success state */
.sg-success-ring {
  display: none;
  width: 52px;
  height: 52px;
  margin: 0 auto 16px;
  border-radius: 50%;
  background: rgba(52,211,153,0.12);
  border: 2px solid #34D399;
  align-items: center;
  justify-content: center;
  animation: successPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.sg-success-ring svg {
  width: 24px;
  height: 24px;
  stroke: #34D399;
  stroke-width: 2.5;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
}

.sg-checkmark {
  stroke-dasharray: 30;
  stroke-dashoffset: 30;
  animation: drawCheck 0.4s ease 0.1s forwards;
}

@keyframes successPop {
  from { transform: scale(0.6); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes drawCheck {
  to { stroke-dashoffset: 0; }
}

/* Modal error text */
.sg-modal-error {
  display: none;
  margin-top: 14px;
  padding: 10px 14px;
  background: rgba(244,63,94,0.10);
  border: 1px solid rgba(244,63,94,0.25);
  border-radius: 10px;
  color: #F43F5E;
  font-size: 12px;
  animation: shakeError 0.35s ease;
}

@keyframes shakeError {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

/* Dot loading dots under text */
.sg-dots span {
  display: inline-block;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--primary);
  margin: 0 2px;
  animation: dotBounce 1.2s ease-in-out infinite;
}
.sg-dots span:nth-child(2) { animation-delay: 0.2s; }
.sg-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotBounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-5px); opacity: 1; }
}

</style>  
</head>  
<body>  

<!-- ✅ ADDED: Blur overlay -->
<div class="sg-overlay" id="sgOverlay"></div>

<!-- ✅ ADDED: Glassmorphism loading modal -->
<div class="sg-modal" id="sgModal">
  <!-- Spinner (shown during loading) -->
  <div class="sg-spinner" id="sgSpinner"></div>
  <!-- Success ring (shown on success) -->
  <div class="sg-success-ring" id="sgSuccessRing">
    <svg viewBox="0 0 24 24">
      <polyline class="sg-checkmark" points="4,12 9,17 20,6"></polyline>
    </svg>
  </div>
  <p class="sg-modal-text" id="sgModalText">Signing you in...</p>
  <p class="sg-modal-sub" id="sgModalSub">
    <span class="sg-dots"><span></span><span></span><span></span></span>
  </p>
  <div class="sg-modal-error" id="sgModalError">Login failed. Please try again.</div>
</div>

<!-- ===== ORIGINAL HTML — UNCHANGED ===== -->
<div class="login-box">  
  
  <img src="/icon-512.png" class="logo" alt="Study Grid Prep">  
  
  <h1><span id="typing"></span><span class="cursor">|</span></h1>  
  
  <p class="sub">Smart Study Platform</p>  
  <p class="desc">Study Smarter. Score Better</p>  
  
  <div class="login-card">  
    <button class="google-btn" id="loginBtn" onclick="handleLogin()">  
      <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google">  
      Continue with Google  
    </button>  
  
    <div class="error-toast" id="errorToast">  
      Login failed. Please try again.  
    </div>  
  </div>  
  
  <div class="features-row">  
    <span class="pill">📚 MOCK TESTS</span>  
    <span class="pill">⏱ FOCUS TIMER</span>  
    <span class="pill">▶️ YT STUDY PLAYLIST</span>  
    <span class="pill">TODO LIST</span>  
    <span class="pill">🏆 LEADERBOARD</span>
    <!-- ✅ ADDED: AI ANALYSIS chip -->
    <span class="pill">🤖 AI ANALYSIS</span>
  </div>  
  
  <p class="login-footer" style="margin-top:20px;">  
    By continuing you agree to our  
    <a href="terms.html">Terms</a> &amp;  
    <a href="privacy.html">Privacy Policy</a>  
  </p>  
  
</div>  
  
<script type="module">  
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";  
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";  
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";  
  
const firebaseConfig = {  
  apiKey: "AIzaSyB_13GJOiLQwxsirfJ7T_4WinaxVmSp7fs",  
  authDomain: "untitled-world-2e645.firebaseapp.com",  
  projectId: "untitled-world-2e645",  
  storageBucket: "untitled-world-2e645.firebasestorage.app",  
  messagingSenderId: "990115586087",  
  appId: "1:990115586087:web:963f68bd59dec5ef0c6e02"  
};  
  
const app = initializeApp(firebaseConfig);  
const auth = getAuth(app);  
const db = getFirestore(app);  
const provider = new GoogleAuthProvider();  
  
function getTodayDate(){  
  const d = new Date();  
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();  
}

/* ===================================================
   ✅ ADDED: Modal helper functions
   =================================================== */

function showModal() {
  const overlay = document.getElementById("sgOverlay");
  const modal   = document.getElementById("sgModal");
  // Reset to loading state
  document.getElementById("sgSpinner").style.display = "block";
  document.getElementById("sgSuccessRing").style.display = "none";
  document.getElementById("sgModalText").textContent = "Signing you in...";
  document.getElementById("sgModalSub").innerHTML = '<span class="sg-dots"><span></span><span></span><span></span></span>';
  document.getElementById("sgModalError").style.display = "none";
  overlay.classList.add("active");
  modal.classList.add("active");
}

function showSuccess() {
  document.getElementById("sgSpinner").style.display = "none";
  const ring = document.getElementById("sgSuccessRing");
  ring.style.display = "flex";
  document.getElementById("sgModalText").textContent = "Welcome back! 🎉";
  document.getElementById("sgModalSub").textContent = "Taking you to dashboard...";
}

function hideModal() {
  const overlay = document.getElementById("sgOverlay");
  const modal   = document.getElementById("sgModal");
  overlay.classList.remove("active");
  modal.classList.remove("active");
}

function showModalError(msg) {
  document.getElementById("sgSpinner").style.display = "none";
  document.getElementById("sgSuccessRing").style.display = "none";
  document.getElementById("sgModalText").textContent = "Something went wrong";
  document.getElementById("sgModalSub").textContent = "";
  const err = document.getElementById("sgModalError");
  err.textContent = msg || "Login failed. Please try again.";
  err.style.display = "block";
  // Auto hide modal after 2.5s on error
  setTimeout(() => {
    hideModal();
  }, 2500);
}

/* ===================================================
   ✅ REPLACED: handleLogin (was window.login)
   =================================================== */

window.handleLogin = async function() {
  const btn   = document.getElementById("loginBtn");
  const toast = document.getElementById("errorToast");

  // Guard: prevent double-click
  if (btn.classList.contains("loading")) return;

  // 1. Show button loading state
  btn.classList.add("loading");
  btn.innerHTML = `
    <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google" style="width:20px;height:20px;background:white;border-radius:50%;padding:2px;">
    Connecting...
  `;
  toast.style.display = "none";

  // 2. Show Claude-style modal overlay
  showModal();

  try {
    // 3. Firebase signInWithPopup (popup appears on top of modal)
    const result = await signInWithPopup(auth, provider);
    const user = result.user;
    const name = user.displayName;
    const email = user.email;

    localStorage.setItem("userName", name);
    localStorage.setItem("userEmail", email);

    await setDoc(doc(db, "users", name), {
      name: name,
      email: email,
      focusTime: 0,
      weeklyXP: 0,
      status: "Online",
      room: "global",
      lastActiveDate: getTodayDate()
    }, { merge: true });

    // 4. Show success state in modal
    showSuccess();

    // 5. Smooth fade-out + navigate
    setTimeout(() => {
      hideModal();
      document.body.style.opacity = "0";
      document.body.style.transition = "opacity 0.25s ease";
      setTimeout(() => {
        const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        window.location.href = isPWA ? "mainwelcome.html" : "dashboard-home.html";
      }, 250);
    }, 1200);

  } catch (err) {
    console.log(err);
    // 6. Show error in modal, re-enable button
    const errMsg = err.code === "auth/popup-closed-by-user"
      ? "Popup closed. Please try again."
      : err.code === "auth/network-request-failed"
      ? "Network error. Check your connection."
      : "Login failed. Please try again.";

    showModalError(errMsg);

    btn.classList.remove("loading");
    btn.innerHTML = `
      <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google" style="width:20px;height:20px;background:white;border-radius:50%;padding:2px;">
      Continue with Google
    `;
  }
};

/* ===== ORIGINAL: Typing animation — UNCHANGED ===== */
const text = "Welcome to Study Grid Prep";  
let i = 0;  
function typeText(){  
  if(i < text.length){  
    document.getElementById("typing").textContent += text.charAt(i);  
    i++;  
    setTimeout(typeText, 65);  
  }  
}  
typeText();  
</script>  
  
</body>  
</html>
