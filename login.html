<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Untitled World</title>

<link rel="icon" href="/icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;

display:flex;
justify-content:center;
align-items:center;

color:white;

}

.login-box{

text-align:center;
max-width:350px;

}

.logo{

width:90px;
margin-bottom:20px;

}

h1{

font-size:28px;
margin-bottom:5px;

}

.sub{

opacity:.85;
font-size:18px;
}

.desc{

opacity:.7;
margin-top:6px;
margin-bottom:25px;

}

.google-btn{

display:flex;
align-items:center;
justify-content:center;

gap:10px;

background:white;
color:black;

border:none;

padding:14px 24px;

border-radius:30px;

font-weight:600;

cursor:pointer;

}

.google-btn img{

width:20px;

}

</style>

</head>

<body>

<div class="login-box">

<img src="/icon-512.png" class="logo">

<h1>Welcome to Untitled World</h1>

<p class="sub">Smart Study Platform</p>

<p class="desc">Distraction Free Learning</p>

<button class="google-btn" onclick="login()">

<img src="https://developers.google.com/identity/images/g-logo.png">

Login with Google

</button>

</div>

<script>

function login(){

let name = prompt("Enter your name");

if(name){

localStorage.setItem("userName",name);

window.location="index.html";

}

}

</script>

</body>
</html>
