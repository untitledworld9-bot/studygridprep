<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Focus Runner — Step 1</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:#0a0a1a;color:#fff;font-family:sans-serif;
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    padding:20px;
  }
  h1{color:#00f5ff;font-size:42px;margin-bottom:8px;}
  p{color:#888;margin-bottom:30px;}
  button{
    font-size:24px;padding:22px 60px;background:#00f5ff;color:#000;
    border:none;border-radius:50px;font-weight:bold;
  }
  #gameScreen{display:none;}
  #gameScreen.show{display:flex;flex-direction:column;align-items:center;}
</style>
</head>
<body>

<div id="startScreen">
  <h1>FOCUS RUNNER</h1>
  <p>Step 1 test build</p>
  <button id="playBtn">PLAY NOW</button>
</div>

<div id="gameScreen">
  <h1 style="color:#0f0;">GAME STARTED! ✓</h1>
  <p>Agar ye dikh raha hai, matlab tap + screen switch dono kaam kar rahe hain.</p>
  <button id="backBtn" style="background:#f44;">BACK</button>
</div>

<script>
document.getElementById('playBtn').addEventListener('click', function(){
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameScreen').classList.add('show');
});
document.getElementById('backBtn').addEventListener('click', function(){
  document.getElementById('gameScreen').classList.remove('show');
  document.getElementById('startScreen').style.display = 'flex';
});
</script>

</body>
</html>
