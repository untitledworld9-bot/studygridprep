<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TAP TEST</title>
</head>
<body style="margin:0;padding:40px 20px;background:#000;color:#fff;font-family:sans-serif;text-align:center;">

<h1 style="color:yellow;">MINIMAL TEST — v4</h1>
<p>Agar ye bhi kaam nahi karta, to 100% server/deployment ka issue hai.</p>

<button id="btn" style="font-size:28px;padding:30px 50px;background:#0f0;color:#000;border:none;border-radius:12px;margin-top:30px;">
TAP ME
</button>

<h2 id="result" style="margin-top:40px;color:#0ff;">Taps: 0</h2>

<script>
var n = 0;
document.getElementById('btn').addEventListener('click', function(){
  n++;
  document.getElementById('result').textContent = 'Taps: ' + n;
  document.body.style.background = (n % 2 === 0) ? '#000' : '#300';
});
</script>

</body>
</html>
