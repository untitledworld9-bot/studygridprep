<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Leaderboard ⚡ Focus Runner</title>
<meta name="theme-color" content="#000008">
<link rel="icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════════
   BASE
═══════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#000008;--bg2:#04061a;--bg3:#080d2a;
  --cyan:#00f5ff;--violet:#bf00ff;--gold:#ffd700;
  --green:#00ff88;--pink:#f472b6;--amber:#fb923c;
  --text:#e0eaff;--text2:rgba(224,234,255,.55);--text3:rgba(224,234,255,.25);
  --border:rgba(0,245,255,.12);--border2:rgba(255,255,255,.05);
  --nav-h:72px;
}
html{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;}
body{min-height:100dvh;background:var(--bg);overflow-x:hidden;}

/* ── BG STARS ── */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 0%,rgba(0,245,255,.06),transparent),
    radial-gradient(ellipse 60% 40% at 80% 100%,rgba(191,0,255,.05),transparent);
  pointer-events:none;z-index:0;
}

/* ═══════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════ */
.lb-header{
  position:sticky;top:0;z-index:100;
  padding:max(14px,env(safe-area-inset-top,14px)) 16px 12px;
  background:rgba(0,0,8,.9);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
}
.lb-back{
  width:36px;height:36px;border-radius:10px;
  background:rgba(255,255,255,.06);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--cyan);flex-shrink:0;
  transition:all .2s;text-decoration:none;
}
.lb-back:hover{background:rgba(0,245,255,.12);}
.lb-back svg{width:18px;height:18px;}
.lb-title-wrap{flex:1;}
.lb-title{
  font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;
  background:linear-gradient(135deg,var(--cyan),var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:2px;
}
.lb-subtitle{font-size:11px;color:var(--text3);letter-spacing:1px;margin-top:1px;}
.lb-live-badge{
  display:flex;align-items:center;gap:5px;
  font-size:9px;font-family:'Orbitron',sans-serif;letter-spacing:1px;
  color:var(--green);background:rgba(0,255,136,.08);
  border:1px solid rgba(0,255,136,.2);padding:5px 10px;border-radius:99px;
}
.lb-live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.4s infinite;}

/* ═══════════════════════════════════════════════════
   MAIN SCROLL
═══════════════════════════════════════════════════ */
.lb-main{
  position:relative;z-index:1;
  padding:16px 16px calc(var(--nav-h) + 24px + env(safe-area-inset-bottom, 0px));
  max-width:560px;margin:0 auto;
}

/* ═══════════════════════════════════════════════════
   PODIUM
═══════════════════════════════════════════════════ */
.podium-section{margin-bottom:20px;}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;padding:10px 0 0;}
.pod-slot{flex:1;max-width:140px;display:flex;flex-direction:column;align-items:center;gap:7px;}
.pod-1{order:2;}.pod-2{order:1;}.pod-3{order:3;}

.pod-crown{font-size:20px;text-align:center;min-height:28px;line-height:28px;}
.pod-av{
  display:flex;align-items:center;justify-content:center;
  font-weight:900;border:2px solid transparent;border-radius:18px;
  font-family:'Orbitron',sans-serif;
}
.pod-1 .pod-av{width:62px;height:62px;font-size:22px;background:rgba(255,215,0,.15);border-color:var(--gold);box-shadow:0 0 24px rgba(255,215,0,.4);}
.pod-2 .pod-av{width:50px;height:50px;font-size:18px;background:rgba(192,192,192,.1);border-color:#c0c0c0;box-shadow:0 0 14px rgba(192,192,192,.25);}
.pod-3 .pod-av{width:44px;height:44px;font-size:16px;background:rgba(205,127,50,.1);border-color:#cd7f32;box-shadow:0 0 10px rgba(205,127,50,.2);}

.pod-name{font-size:11px;font-weight:700;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;color:var(--text);}
.pod-score{font-size:10px;color:var(--cyan);font-family:'Orbitron',sans-serif;font-weight:700;}
.pod-rank{font-size:9px;color:var(--text2);margin-top:1px;}

.pod-base{
  width:100%;border-radius:10px 10px 4px 4px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-weight:900;
}
.pod-1 .pod-base{background:rgba(255,215,0,.1);height:64px;font-size:22px;color:var(--gold);}
.pod-2 .pod-base{background:rgba(192,192,192,.07);height:48px;font-size:18px;color:#c0c0c0;}
.pod-3 .pod-base{background:rgba(205,127,50,.07);height:36px;font-size:16px;color:#cd7f32;}

/* ═══════════════════════════════════════════════════
   MY RANK CARD (sticky bottom pinned style)
═══════════════════════════════════════════════════ */
.my-rank-bar{
  position:sticky;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));
  z-index:90;margin:0 -16px;
  padding:10px 16px;
  background:rgba(0,0,8,.95);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:none; /* shown via JS when user found */
}
.my-rank-inner{
  display:flex;align-items:center;gap:10px;
  background:rgba(0,245,255,.07);
  border:1px solid rgba(0,245,255,.22);
  border-radius:14px;padding:10px 14px;
  position:relative;overflow:hidden;
}
.my-rank-inner::before{
  content:'YOU';position:absolute;right:14px;top:50%;transform:translateY(-50%);
  font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;
  color:rgba(0,245,255,.2);font-weight:900;
}
.my-rank-pos{
  font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;
  color:var(--cyan);text-shadow:0 0 12px var(--cyan);min-width:44px;text-align:center;
}
.my-av{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--cyan),var(--violet));
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;color:#000;flex-shrink:0;
}
.my-info{flex:1;min-width:0;}
.my-name{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.my-rank-label{font-size:11px;margin-top:1px;}
.my-score{text-align:right;flex-shrink:0;}
.my-score-val{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:900;color:var(--cyan);}
.my-score-xp{font-size:10px;color:rgba(0,255,136,.6);}

/* ═══════════════════════════════════════════════════
   FILTER / SORT BAR
═══════════════════════════════════════════════════ */
.filter-bar{
  display:flex;align-items:center;gap:8px;
  margin-bottom:14px;
}
.filter-chip{
  flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
  padding:8px 10px;border-radius:10px;
  background:rgba(255,255,255,.04);border:1px solid var(--border2);
  font-size:11px;font-family:'Orbitron',sans-serif;letter-spacing:.5px;
  color:var(--text2);cursor:pointer;transition:all .2s;
}
.filter-chip.active{background:rgba(0,245,255,.1);border-color:var(--border);color:var(--cyan);}
.filter-chip svg{width:13px;height:13px;flex-shrink:0;}

.search-wrap{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.04);border:1px solid var(--border2);
  border-radius:10px;padding:8px 12px;margin-bottom:14px;
  transition:border-color .2s;
}
.search-wrap:focus-within{border-color:var(--border);}
.search-wrap svg{width:14px;height:14px;color:var(--text3);flex-shrink:0;}
.search-wrap input{
  background:none;border:none;outline:none;
  color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;flex:1;
}
.search-wrap input::placeholder{color:var(--text3);}

/* ═══════════════════════════════════════════════════
   LIST
═══════════════════════════════════════════════════ */
.lb-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}

.lb-row{
  display:flex;align-items:center;gap:10px;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:14px;padding:11px 13px;
  transition:all .18s;cursor:default;
  position:relative;overflow:hidden;
}
.lb-row:hover{border-color:var(--border);background:rgba(8,13,42,.9);}
.lb-row.me{
  background:rgba(0,245,255,.06);
  border-color:rgba(0,245,255,.25);
  box-shadow:0 0 20px rgba(0,245,255,.06);
}
.lb-row.top1{border-color:rgba(255,215,0,.3);background:rgba(255,215,0,.04);}
.lb-row.top2{border-color:rgba(192,192,192,.2);background:rgba(192,192,192,.02);}
.lb-row.top3{border-color:rgba(205,127,50,.2);background:rgba(205,127,50,.02);}

/* shimmer on top 3 */
.lb-row.top1::after,.lb-row.top2::after,.lb-row.top3::after{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);
  animation:shimmer 3s infinite;pointer-events:none;
}
@keyframes shimmer{0%{left:-100%;}100%{left:160%;}}

.row-pos{
  font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;
  min-width:32px;text-align:center;color:var(--text3);
}
.lb-row.top1 .row-pos{color:var(--gold);}
.lb-row.top2 .row-pos{color:#c0c0c0;}
.lb-row.top3 .row-pos{color:#cd7f32;}

.row-av{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,var(--cyan),var(--violet));
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;color:#000;flex-shrink:0;
}
.row-info{flex:1;min-width:0;}
.row-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.row-rank{font-size:10px;margin-top:2px;}
.row-right{text-align:right;flex-shrink:0;}
.row-score{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;color:var(--cyan);}
.row-xp{font-size:10px;color:rgba(0,255,136,.55);}

/* rank badge colors */
.rk{font-size:10px;font-weight:600;}
.rk-Beginner{color:#94a3b8;}.rk-Focused{color:#22d3ee;}.rk-Scholar{color:#a78bfa;}
.rk-Elite{color:#fb923c;}.rk-Master{color:#f472b6;}.rk-Legend{color:#ffd700;}

/* ── LOADING / EMPTY ── */
.lb-loading{
  display:flex;flex-direction:column;align-items:center;gap:14px;
  padding:60px 20px;color:var(--text3);font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;
}
.spin-ring{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--cyan);animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.lb-empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px;}

/* ── SECTION HEADER ── */
.sec-label{
  display:flex;align-items:center;gap:8px;
  font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;
  color:var(--text3);margin-bottom:10px;margin-top:20px;
}
.sec-label::before,.sec-label::after{content:'';flex:1;height:1px;background:var(--border2);}

/* ═══════════════════════════════════════════════════
   STATS ROW
═══════════════════════════════════════════════════ */
.stats-row{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  margin-bottom:20px;
}
.stat-chip{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:12px;padding:12px 10px;text-align:center;
}
.stat-chip .sv{
  font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;
  color:var(--cyan);display:block;margin-bottom:3px;
}
.stat-chip .sl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;}

/* ═══════════════════════════════════════════════════
   TOP-10 POPUP (professional entry)
═══════════════════════════════════════════════════ */
#top10Popup{
  position:fixed;inset:0;z-index:9000;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,8,.85);backdrop-filter:blur(18px);
  opacity:0;pointer-events:none;
  transition:opacity .4s ease;
}
#top10Popup.show{opacity:1;pointer-events:all;}

.t10-box{
  width:min(360px,92vw);
  background:rgba(4,6,26,.97);
  border-radius:24px;
  border:1px solid rgba(0,245,255,.3);
  box-shadow:0 0 60px rgba(0,245,255,.15),0 30px 80px rgba(0,0,0,.8);
  overflow:hidden;
  transform:scale(.85) translateY(30px);
  transition:transform .5s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
#top10Popup.show .t10-box{transform:scale(1) translateY(0);}

/* animated top glow bar */
.t10-bar{
  height:3px;
  background:linear-gradient(90deg,var(--cyan),var(--violet),var(--cyan));
  background-size:200% 100%;
  animation:gradMove 2s linear infinite;
}
@keyframes gradMove{0%{background-position:0% 0%;}100%{background-position:200% 0%;}}

.t10-body{padding:24px 22px 20px;}

.t10-medal{font-size:48px;text-align:center;display:block;margin-bottom:8px;
  animation:medalBounce .6s ease .3s both;
}
@keyframes medalBounce{0%{transform:scale(0) rotate(-20deg);}70%{transform:scale(1.2) rotate(5deg);}100%{transform:scale(1) rotate(0);};}

.t10-title{
  font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;
  text-align:center;letter-spacing:3px;
  background:linear-gradient(135deg,var(--gold),var(--amber));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:4px;
}
.t10-subtitle{font-size:12px;color:var(--text2);text-align:center;letter-spacing:1px;margin-bottom:20px;}

.t10-rank-badge{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:rgba(0,245,255,.08);border:1px solid rgba(0,245,255,.2);
  border-radius:14px;padding:14px 16px;margin-bottom:16px;
}
.t10-pos{
  font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;
  color:var(--cyan);text-shadow:0 0 20px var(--cyan);
}
.t10-rank-info{flex:1;}
.t10-rank-name{font-size:15px;font-weight:700;color:var(--text);}
.t10-rank-label{font-size:11px;color:var(--text2);margin-top:2px;}

.t10-stats{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;
}
.t10-stat{
  background:rgba(255,255,255,.04);border:1px solid var(--border2);
  border-radius:10px;padding:10px;text-align:center;
}
.t10-stat .sv{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:var(--cyan);display:block;margin-bottom:2px;}
.t10-stat .sl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;}

.t10-close{
  width:100%;padding:13px;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--cyan),var(--violet));
  color:#000;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;
  cursor:pointer;letter-spacing:1px;
  transition:opacity .2s,transform .15s;
}
.t10-close:hover{opacity:.88;transform:translateY(-1px);}

/* confetti dots */
.t10-confetti{position:absolute;top:0;left:0;right:0;height:100%;pointer-events:none;overflow:hidden;}
.conf-dot{position:absolute;border-radius:50%;animation:confFall linear infinite;}
@keyframes confFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1;}100%{transform:translateY(110%) rotate(360deg);opacity:0;}}

/* ═══════════════════════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════════════════════ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  height:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));
  padding-bottom:env(safe-area-inset-bottom,0px);
  background:rgba(0,0,8,.92);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;align-items:stretch;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;cursor:pointer;text-decoration:none;
  color:var(--text3);transition:color .2s;
  padding:8px 4px;
  position:relative;
}
.nav-item.active{color:var(--cyan);}
.nav-item.active::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:32px;height:2px;border-radius:0 0 2px 2px;
  background:linear-gradient(90deg,var(--cyan),var(--violet));
}
.nav-item svg{width:22px;height:22px;stroke-width:1.8;}
.nav-label{font-size:9px;font-family:'Orbitron',sans-serif;letter-spacing:.5px;}

/* ═══════════════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════════════ */
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .35s ease both;}

.row-enter{animation:rowIn .3s ease both;}
@keyframes rowIn{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:translateX(0);}}
</style>
</head>
<body>

<!-- ═══════ HEADER ═══════ -->
<header class="lb-header">
  <a class="lb-back" href="../dashboard-home.html" id="backBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <div class="lb-title-wrap">
    <div class="lb-title">LEADERBOARD</div>
    <div class="lb-subtitle">FOCUS RUNNER · TOP 50</div>
  </div>
  <div class="lb-live-badge">
    <span class="lb-live-dot"></span>LIVE
  </div>
</header>

<!-- ═══════ MAIN ═══════ -->
<main class="lb-main">

  <!-- Stats summary -->
  <div class="stats-row fade-up" id="statsRow" style="display:none;">
    <div class="stat-chip"><span class="sv" id="statPlayers">—</span><span class="sl">Players</span></div>
    <div class="stat-chip"><span class="sv" id="statTopScore">—</span><span class="sl">Top Score</span></div>
    <div class="stat-chip"><span class="sv" id="statTopXP">—</span><span class="sl">Top XP</span></div>
  </div>

  <!-- Podium -->
  <div class="podium-section fade-up" id="podiumSection" style="display:none;">
    <div class="sec-label">TOP 3</div>
    <div class="podium" id="podiumWrap"></div>
  </div>

  <!-- Filter bar -->
  <div class="sec-label" style="margin-top:20px;">RANKINGS</div>
  <div class="filter-bar fade-up">
    <div class="filter-chip active" id="fScore" onclick="setSort('score')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14l-5-4.87 6.91-1.01z"/></svg>
      Score
    </div>
    <div class="filter-chip" id="fXP" onclick="setSort('xp')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      XP
    </div>
    <div class="filter-chip" id="fDist" onclick="setSort('distance')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12h18M12 3l9 9-9 9"/></svg>
      Dist
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap fade-up">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="search" placeholder="Search player…" id="searchInput" oninput="filterPlayers()">
  </div>

  <!-- Loading -->
  <div class="lb-loading" id="lbLoading">
    <div class="spin-ring"></div>
    <span>LOADING…</span>
  </div>

  <!-- List -->
  <div class="lb-list" id="lbList" style="display:none;"></div>

</main>

<!-- ═══════ MY RANK STICKY BAR ═══════ -->
<div class="my-rank-bar" id="myRankBar">
  <div class="my-rank-inner">
    <div class="my-rank-pos" id="myPos">—</div>
    <div class="my-av" id="myAv">?</div>
    <div class="my-info">
      <div class="my-name" id="myName">You</div>
      <div class="my-rank-label" id="myRankLabel">—</div>
    </div>
    <div class="my-score">
      <div class="my-score-val" id="myScoreVal">—</div>
      <div class="my-score-xp" id="myXPVal">— XP</div>
    </div>
  </div>
</div>

<!-- ═══════ TOP-10 POPUP ═══════ -->
<div id="top10Popup">
  <div class="t10-box">
    <!-- confetti -->
    <div class="t10-confetti" id="confettiWrap"></div>
    <div class="t10-bar"></div>
    <div class="t10-body">
      <span class="t10-medal" id="t10Medal">🏆</span>
      <div class="t10-title" id="t10Title">TOP 10!</div>
      <div class="t10-subtitle" id="t10Sub">You're in the elite league</div>
      <div class="t10-rank-badge">
        <div class="t10-pos" id="t10Pos">#1</div>
        <div class="t10-rank-info">
          <div class="t10-rank-name" id="t10Name">Champion</div>
          <div class="t10-rank-label" id="t10RankLabel">Focus Runner Legend</div>
        </div>
      </div>
      <div class="t10-stats">
        <div class="t10-stat"><span class="sv" id="t10Score">—</span><span class="sl">Best Score</span></div>
        <div class="t10-stat"><span class="sv" id="t10XP">—</span><span class="sl">Total XP</span></div>
      </div>
      <button class="t10-close" onclick="closeTop10Popup()">⚡ AWESOME!</button>
    </div>
  </div>
</div>

<!-- ═══════ SCRIPTS ═══════ -->
<script type="module">
import { db, auth, onAuthStateChanged, collection, query, orderBy, limit, onSnapshot } from '../firebase.js';

const RANK_COLORS = {Beginner:'#94a3b8',Focused:'#22d3ee',Scholar:'#a78bfa',Elite:'#fb923c',Master:'#f472b6',Legend:'#ffd700'};
const RANK_ICONS  = {Beginner:'🏅',Focused:'🎯',Scholar:'📚',Elite:'⚡',Master:'🔥',Legend:'👑'};
const MEDALS      = ['🥇','🥈','🥉'];
const POS_MEDALS  = ['🥇','🥈','🥉'];

let _allData  = [];
let _myUid    = null;
let _myUser   = null;
let _sortKey  = 'score';
let _search   = '';
let _popupShown = false;

const $ = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* ── AUTH ── */
onAuthStateChanged(auth, user => {
  _myUser = user;
  _myUid  = user?.uid || localStorage.getItem('fr_uid');
});

/* ── LIVE SNAPSHOT: up to 50 ── */
onSnapshot(
  query(collection(db,'leaderboard'), orderBy('score','desc'), limit(50)),
  snap => {
    _allData = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    render();
    checkTop10Popup();
  },
  err => {
    console.warn('[LB]', err);
    $('lbLoading').innerHTML = '<div class="lb-empty">Could not load leaderboard.<br>Check connection.</div>';
  }
);

/* ── SORT ── */
window.setSort = function(key) {
  _sortKey = key;
  ['fScore','fXP','fDist'].forEach(id => $( id)?.classList.remove('active'));
  const map = {score:'fScore', xp:'fXP', distance:'fDist'};
  $(map[key])?.classList.add('active');
  render();
};

/* ── SEARCH ── */
window.filterPlayers = function() {
  _search = $('searchInput')?.value?.toLowerCase() || '';
  render();
};

/* ── RENDER ── */
function render() {
  let data = [..._allData].sort((a,b) => (b[_sortKey]||0) - (a[_sortKey]||0));
  if (_search) data = data.filter(p => (p.name||'').toLowerCase().includes(_search));

  $('lbLoading').style.display = 'none';

  // Stats
  if (_allData.length) {
    $('statsRow').style.display = 'grid';
    $('statPlayers').textContent = _allData.length;
    $('statTopScore').textContent = Math.max(..._allData.map(x=>x.score||0)).toLocaleString();
    $('statTopXP').textContent    = Math.max(..._allData.map(x=>x.xp||0)).toLocaleString();
  }

  // Podium (top 3 by score, only when no search/filter-change on default sort)
  if (!_search && _sortKey === 'score' && _allData.length >= 1) {
    $('podiumSection').style.display = 'block';
    renderPodium(_allData.slice(0,3));
  } else {
    $('podiumSection').style.display = 'none';
  }

  // List
  $('lbList').style.display = 'flex';
  if (!data.length) {
    $('lbList').innerHTML = '<div class="lb-empty">No players found.</div>';
    return;
  }

  $('lbList').innerHTML = data.map((p, i) => {
    const isMe = p.id === _myUid || p.uid === _myUid;
    const rankColor = RANK_COLORS[p.rank] || '#94a3b8';
    const pos = i + 1;
    const medal = pos <= 3 ? MEDALS[pos-1] : `#${pos}`;
    const cls = isMe ? 'me' : pos===1?'top1':pos===2?'top2':pos===3?'top3':'';
    return `
      <div class="lb-row ${cls} row-enter" style="animation-delay:${Math.min(i*0.04,0.5)}s">
        <span class="row-pos">${medal}</span>
        <div class="row-av">${((p.name||'?')[0]).toUpperCase()}</div>
        <div class="row-info">
          <div class="row-name">${esc(p.name||'—')}${isMe ? ' <span style="font-size:9px;color:var(--cyan);font-family:Orbitron,sans-serif;"> YOU</span>' : ''}</div>
          <div class="row-rank rk rk-${p.rank||'Beginner'}">${RANK_ICONS[p.rank]||'🏅'} ${p.rank||'Beginner'} · ${Math.floor(p.distance||0)}m</div>
        </div>
        <div class="row-right">
          <div class="row-score">${(p[_sortKey]||0).toLocaleString()}</div>
          <div class="row-xp">${p.xp||0} XP</div>
        </div>
      </div>`;
  }).join('');

  // My rank sticky bar
  updateMyRankBar(data);
}

function renderPodium(top) {
  const slots = [1, 0, 2]; // visual order: 2nd, 1st, 3rd
  const crowns = ['🥇','🥈','🥉'];
  const cls    = ['pod-1','pod-2','pod-3'];
  const podOrder = [top[0],top[1],top[2]];

  $('podiumWrap').innerHTML = [1,0,2].map(i => {
    const p = podOrder[i];
    if (!p) return '';
    return `
      <div class="pod-slot ${cls[i]}">
        <div class="pod-crown">${crowns[i]}</div>
        <div class="pod-av">${((p.name||'?')[0]).toUpperCase()}</div>
        <div class="pod-name">${esc(p.name||'—')}</div>
        <div class="pod-score">${(p.score||0).toLocaleString()}</div>
        <div class="pod-rank rk rk-${p.rank||'Beginner'}">${RANK_ICONS[p.rank]||'🏅'} ${p.rank||'Beginner'}</div>
        <div class="pod-base">${i+1}</div>
      </div>`;
  }).join('');
}

function updateMyRankBar(sortedData) {
  const myIdx = sortedData.findIndex(p => p.id === _myUid || p.uid === _myUid);
  if (myIdx === -1) { $('myRankBar').style.display = 'none'; return; }
  const me = sortedData[myIdx];
  const pos = myIdx + 1;
  $('myRankBar').style.display = 'block';
  $('myPos').textContent    = `#${pos}`;
  $('myAv').textContent     = ((me.name||'?')[0]).toUpperCase();
  $('myName').textContent   = me.name || 'You';
  $('myRankLabel').innerHTML = `<span class="rk rk-${me.rank||'Beginner'}">${RANK_ICONS[me.rank]||'🏅'} ${me.rank||'Beginner'}</span>`;
  $('myScoreVal').textContent = (me[_sortKey]||0).toLocaleString();
  $('myXPVal').textContent   = (me.xp||0) + ' XP';
}

/* ── TOP-10 POPUP ── */
function checkTop10Popup() {
  if (_popupShown) return;
  if (!_myUid) return;

  // Sort by score to find rank
  const sorted = [..._allData].sort((a,b) => (b.score||0) - (a.score||0));
  const myIdx  = sorted.findIndex(p => p.id === _myUid || p.uid === _myUid);
  if (myIdx === -1 || myIdx >= 10) return; // not in top 10

  _popupShown = true;
  const me  = sorted[myIdx];
  const pos = myIdx + 1;

  // Determine medal / message
  let medal, title, sub;
  if (pos === 1)      { medal='👑'; title='RANK #1!'; sub='You are the champion of Focus Runner'; }
  else if (pos === 2) { medal='🥈'; title='TOP 2!'; sub='One step from the crown — keep going!'; }
  else if (pos === 3) { medal='🥉'; title='TOP 3!'; sub='On the podium — legendary run!'; }
  else if (pos <= 5)  { medal='⚡'; title=`TOP ${pos}!`; sub='Elite tier — you\'re crushing it!'; }
  else                { medal='🔥'; title=`TOP ${pos}!`; sub='In the elite top 10 — incredible!'; }

  $('t10Medal').textContent    = medal;
  $('t10Title').textContent    = title;
  $('t10Sub').textContent      = sub;
  $('t10Pos').textContent      = `#${pos}`;
  $('t10Name').textContent     = me.name || 'You';
  $('t10RankLabel').innerHTML  = `<span class="rk rk-${me.rank||'Beginner'}">${RANK_ICONS[me.rank]||'🏅'} ${me.rank||'Beginner'}</span>`;
  $('t10Score').textContent    = (me.score||0).toLocaleString();
  $('t10XP').textContent       = (me.xp||0).toLocaleString();

  // Confetti
  spawnConfetti();

  // Show with slight delay for drama
  setTimeout(() => $('top10Popup').classList.add('show'), 600);
}

window.closeTop10Popup = function() {
  $('top10Popup').classList.remove('show');
};

function spawnConfetti() {
  const wrap = $('confettiWrap');
  const colors = ['#ffd700','#00f5ff','#bf00ff','#00ff88','#f472b6','#fb923c'];
  for (let i = 0; i < 18; i++) {
    const dot = document.createElement('div');
    const size = 4 + Math.random() * 6;
    dot.className = 'conf-dot';
    dot.style.cssText = `
      width:${size}px;height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:${Math.random()*100}%;
      animation-duration:${1.5+Math.random()*2}s;
      animation-delay:${Math.random()*1.5}s;
    `;
    wrap.appendChild(dot);
  }
}

</script>
</body>
